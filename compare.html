<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeRoom PRO — Design Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOP BAR ── */
.topbar{height:56px;background:rgba(10,10,15,.95);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;z-index:100;}
.tb-logo{font-size:15px;font-weight:800;letter-spacing:-.3px;color:#fff;}
.tb-logo span{color:#22d3ee;}
.tb-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;}
.tb-divider{width:1px;height:20px;background:rgba(255,255,255,.1);}

/* MODE TOGGLE */
.mode-toggle{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;gap:2px;margin-left:auto;}
.mode-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.45);background:transparent;}
.mode-btn.active{background:#fff;color:#0a0a0f;}
.mode-btn.active.dark{background:#22d3ee;color:#000;}

/* SIDE LABELS */
.side-labels{display:flex;flex-shrink:0;}
.side-label{flex:1;height:32px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.side-label.light{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border-right:1px solid rgba(255,255,255,.06);}
.side-label.dark{background:rgba(6,182,212,.04);color:#22d3ee;}
.side-dot{width:8px;height:8px;border-radius:50%;}

/* SPLIT VIEW */
.split{flex:1;display:flex;min-height:0;position:relative;}
.pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative;}
.pane.light-pane{border-right:1px solid rgba(255,255,255,.08);}
.pane iframe{flex:1;width:100%;border:none;min-height:0;}

/* SINGLE VIEW */
.split.single-view .pane{display:none;}
.split.single-view .pane.shown{display:flex;flex:1;}

/* DIVIDER DRAG */
.drag-divider{width:4px;background:rgba(255,255,255,.08);cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s;display:flex;align-items:center;justify-content:center;}
.drag-divider:hover{background:rgba(34,211,238,.3);}
.drag-divider::after{content:'⋮';font-size:14px;color:rgba(255,255,255,.25);letter-spacing:-2px;}
.single-view .drag-divider{display:none;}

/* CHOOSE BANNER */
.choose-bar{height:48px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:16px;flex-shrink:0;}
.choose-bar span{font-size:12px;color:rgba(255,255,255,.35);}
.choose-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:8px 20px;border-radius:9px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.choose-btn.light-btn{background:#fff;color:#0a0a0f;}
.choose-btn.light-btn:hover{background:#f0f0f0;}
.choose-btn.dark-btn{background:#22d3ee;color:#000;}
.choose-btn.dark-btn:hover{opacity:.88;}

/* OVERLAY BADGE */
.pane-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.06em;pointer-events:none;z-index:10;text-transform:uppercase;}
.pane-badge.light{background:rgba(255,255,255,.9);color:#0a0a0f;}
.pane-badge.dark{background:#22d3ee;color:#000;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">TradeRoom<span> PRO</span></div>
  <div class="tb-divider"></div>
  <div class="tb-label">Design Comparison</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnSplit" onclick="setMode('split')">Side by Side</button>
    <button class="mode-btn" id="btnLight" onclick="setMode('light')">☀ Light Only</button>
    <button class="mode-btn dark" id="btnDark" onclick="setMode('dark')">◑ Dark Only</button>
  </div>
</div>

<div class="side-labels" id="sideLabels">
  <div class="side-label light">
    <div class="side-dot" style="background:#f2f2f7;border:1.5px solid rgba(255,255,255,.3);"></div>
    Design 01 — Apple Light
  </div>
  <div class="side-label dark">
    <div class="side-dot" style="background:#22d3ee;"></div>
    Design 02 — Midnight Cyan
  </div>
</div>

<div class="split" id="split">

  <!-- LIGHT PANE -->
  <div class="pane light-pane" id="lightPane">
    <div class="pane-badge light">☀ Light</div>
    <iframe id="lightFrame" src="trading-dashboard.html" title="Light theme dashboard"></iframe>
  </div>

  <!-- DRAG DIVIDER -->
  <div class="drag-divider" id="dragDiv"></div>

  <!-- DARK PANE -->
  <div class="pane dark-pane" id="darkPane">
    <div class="pane-badge dark">◑ Dark</div>
    <iframe id="darkFrame" src="trading-dashboard-dark.html" title="Dark theme dashboard"></iframe>
  </div>

</div>

<div class="choose-bar">
  <span>Which design do you prefer?</span>
  <button class="choose-btn light-btn" onclick="choose('light')">Choose Light ☀</button>
  <button class="choose-btn dark-btn" onclick="choose('dark')">Choose Dark ◑</button>
</div>

<script>
/* ── MODE TOGGLE ── */
function setMode(mode) {
  const split    = document.getElementById('split');
  const lightPane = document.getElementById('lightPane');
  const darkPane  = document.getElementById('darkPane');
  const dragDiv   = document.getElementById('dragDiv');
  const labels    = document.getElementById('sideLabels');
  const btnSplit  = document.getElementById('btnSplit');
  const btnLight  = document.getElementById('btnLight');
  const btnDark   = document.getElementById('btnDark');

  [btnSplit, btnLight, btnDark].forEach(b => b.classList.remove('active'));

  if (mode === 'split') {
    btnSplit.classList.add('active');
    split.classList.remove('single-view');
    lightPane.classList.remove('shown'); darkPane.classList.remove('shown');
    lightPane.style.flex = ''; darkPane.style.flex = '';
    labels.style.display = 'flex';
    dragDiv.style.display = '';
  } else if (mode === 'light') {
    btnLight.classList.add('active');
    split.classList.add('single-view');
    lightPane.classList.add('shown'); darkPane.classList.remove('shown');
    labels.style.display = 'none';
  } else {
    btnDark.classList.add('active');
    split.classList.add('single-view');
    darkPane.classList.add('shown'); lightPane.classList.remove('shown');
    labels.style.display = 'none';
  }
}

/* ── DRAG RESIZE ── */
const drag = document.getElementById('dragDiv');
let dragging = false, startX = 0, startLeft = 0;

drag.addEventListener('mousedown', e => {
  dragging = true;
  startX = e.clientX;
  const lp = document.getElementById('lightPane');
  startLeft = lp.offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const total = document.getElementById('split').offsetWidth;
  const delta = e.clientX - startX;
  const newLeft = Math.max(300, Math.min(total - 300, startLeft + delta));
  document.getElementById('lightPane').style.flex = 'none';
  document.getElementById('lightPane').style.width = newLeft + 'px';
  document.getElementById('darkPane').style.flex = '1';
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

/* ── CHOOSE ── */
function choose(design) {
  const msg = design === 'light'
    ? '☀ You chose Light! Rename trading-dashboard.html in GitHub and it goes live.'
    : '◑ You chose Dark! Copy trading-dashboard-dark.html content into trading-dashboard.html in GitHub.';
  alert(msg);
}
</script>
</body>
</html>
