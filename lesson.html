function buildM3L5() {
  return obj('By the end of this lesson you will be able to identify the pre-market and opening characteristics that distinguish a gap-and-go from a gap-and-trap before committing to a trade.') +
    h2('5.1 The Two Most Common Small-Cap Opening Patterns') +
    p('When a small-cap stock gaps up significantly on a catalyst, one of two things happens at 9:30 AM. It either continues its move — the gap-and-go — or it immediately reverses — the gap-and-trap. Learning to distinguish them before the market opens is one of the most valuable skills in small-cap day trading.') +
    twoCol('Gap-and-go','The stock consolidates above the pre-market high, opens with strength, breaks to new highs with volume, and continues upward throughout power hour. Buyers are in control from the open.','Gap-and-trap','The stock spikes briefly at or above the pre-market high at the open, then immediately reverses as sellers overwhelm the initial buying. Late buyers who bought the spike are trapped.','green','red') +
    h2('5.2 Pre-Market Signals of a Gap-and-Go') +
    ul(['Stock holds above its pre-market high for at least 30 minutes before the open — buyers are defending the level.',
        'Volume steadily increasing pre-market — sustained buying interest, not one spike.',
        'Tier 1 or 2 catalyst confirmed — FDA decision, earnings beat, major contract.',
        'Low float — under 10M shares.',
        'High short interest — fuel for continuation as shorts are squeezed.',
        'No S-3 filing — company is not trying to sell shares into the strength.']) +
    h2('5.3 Pre-Market Signals of a Gap-and-Trap') +
    ul(['Stock unable to hold above its pre-market high — sellers taking profits into the strength.',
        'Pre-market volume came in one early spike then faded — initial reaction, not sustained interest.',
        'Weak or Tier 3 catalyst — unusual volume with no confirmed news.',
        'Recent S-3 filing — company has registered shares it can sell into any strength.',
        'Stock already extended 100%+ on a thin catalyst — initial buyers may take profits at the open.',
        'Market-makers widening the spread pre-market — sign of low liquidity.']) +
    callout('amber','The hardest lesson','A gap-and-trap looks exactly like a gap-and-go for the first 10-30 seconds of trading. The spike above the pre-market high happens to both. The difference is what happens next. If you enter at the spike, you may be the trapped buyer. This is why the CREDO rule is to wait for a confirmed break above the PMH with volume — not the first tick above it.') +
    h2('5.4 The Opening Range Breakout — Separating the Two') +
    p('The opening range is the price range established in the first 1-5 minutes of trading. Use it to distinguish the two patterns:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Let the first 1-2 minutes trade without entering. Watch where the stock finds support.</li>' +
      '<li>If the stock dips on the open but holds above VWAP and consolidates — potential gap-and-go. Entry on the breakout.</li>' +
      '<li>If the stock spikes above the PMH then fails back below it — gap-and-trap. Do not buy the first spike.</li>' +
      '<li>The entry for a gap-and-go is the breakout above the opening range high — not the open itself.</li>' +
    '</ol>' +
    callout('green','CREDO entry rule','On a gap-and-go setup, the entry is after the opening range consolidation — not at the open. Wait for the stock to pull back slightly, find support above VWAP, then break to a new high of day with increasing volume. This misses the first move but catches the larger continuation with better risk/reward.');
}

function buildM3L6() {
  return obj('By the end of this lesson you will understand what causes a trading halt, how long it lasts, what Level 2 and price action look like into and out of a halt, and why beginners should observe halts rather than trade them.') +
    h2('6.1 What is a Trading Halt?') +
    p('A trading halt is a temporary suspension of all trading in a specific stock. During a halt, no orders can be entered, modified, or cancelled. Any open orders are frozen. If you are in a position when a halt occurs, you cannot exit until it lifts. Your position is locked at whatever price it was when the halt triggered.') +
    h2('6.2 LULD Halts — Limit Up / Limit Down') +
    p('LULD halts are automatic circuit breakers designed to prevent runaway price moves. They are the most common halts on small-cap stocks.') +
    dataTable(['Stock price range','LULD band','Example'],[['$0.25 - $3.00','20% in 5 minutes','$2 stock halts above $2.40 or below $1.60'],['$3.00 - $25.00','10% in 5 minutes','$10 stock halts above $11 or below $9'],['Above $25.00','5% in 5 minutes','$30 stock halts above $31.50 or below $28.50']]) +
    p('When a stock triggers the LULD band, trading pauses for 5 minutes. After 5 minutes, trading resumes via a reopening auction. The reopening price can be dramatically different from the halt price — this is where the danger lies.') +
    h2('6.3 The Halt-and-Resume Cycle') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Halt triggers. All trading freezes. Bid and ask removed from Level 2.</li>' +
      '<li>During the halt, news may continue flowing. An S-3 or bad news can hit while you are stuck long.</li>' +
      '<li>At T-minus 1 minute, a "quote-only" period begins. Limit orders can be entered but not filled.</li>' +
      '<li>The reopening auction runs — the exchange matches all queued buy and sell orders to establish the opening price.</li>' +
      '<li>Regular trading resumes. First few seconds are extremely high volatility.</li>' +
    '</ol>' +
    callout('amber','Beginner rule','Do not enter a new position in the 5 minutes before a potential halt (when a stock is approaching its LULD band) or in the first 30 seconds after a halt resumes. The reopening price is unpredictable and the spread is often enormous.') +
    h2('6.4 Regulatory Halts') +
    p('Regulatory halts (T1 or T2) are imposed by FINRA or the SEC and are not automatic. They occur when regulators have concerns about a stock — pending material news, abnormal trading activity, or questions about company disclosure.') +
    twoCol('T1 halt','Pending news. The company has material information about to be released. Duration: minutes to hours. Stock typically resumes after news is published. Can be bullish or bearish.','T2 halt','Extraordinary market activity. Regulators see unusual trading patterns suggesting manipulation. Duration: hours to days. Often bearish when it lifts.','blue','red') +
    h2('6.5 How to Identify a Halt Coming') +
    ul(['Stock moving extremely fast — 15-20% in a single minute. LULD band may be approaching.',
        'Volume spikes to 10x+ normal in a single candle.',
        'Level 2 shows no asks (buy-side halt) or no bids (sell-side halt) — market makers stepping back.',
        'Previous halts the same day — a stock that has halted once is more likely to halt again.']) +
    callout('green','Observation homework','In your next 10 trading sessions, note every halt you observe on your watchlist stocks. Record: the stock, the price at halt, the catalyst, the halt duration, and the reopening price vs the halt price. After 10 observations you will have a real dataset of how halts affect price.');
}

function buildM5L1() {
  return obj('By the end of this lesson you will be able to calculate the correct share size for any trade using the CREDO position sizing formula, given any account size, risk percentage, and stop distance.') +
    h2('1.1 Why Position Sizing Is the Foundation of Everything') +
    p('Position sizing is the single most important mechanical skill in trading. It answers one question before every trade: how many shares do I buy? Get this wrong — too many shares — and one bad trade can end your account. Get it right — every single time — and you can survive a long losing streak and still be in the game to recover.') +
    p('Most beginners think about trading in terms of price targets: "If this stock goes from $5 to $6, I make $1 per share." Professionals think about trading in terms of risk: "I am willing to lose $100 on this trade. How many shares does that allow me to buy?" The difference in approach is everything.') +
    h2('1.2 The CREDO Position Sizing Formula') +
    p('The formula has three inputs and one output:') +
    defTable([
      ['Account size','The total capital in your trading account. For paper trading, use your intended live account size — not the full $1M IB paper account.'],
      ['Risk per trade %','The maximum percentage of your account you are willing to lose on a single trade. At CREDO: 0.5% for paper trading, up to 1% for live trading once approved.'],
      ['Stop distance','The distance in dollars between your entry price and your stop loss price. This is the most critical input — it must be set before you size the trade.'],
    ]) +
    p('Formula: Share size = (Account size × Risk %) ÷ Stop distance') +
    callout('green','Example','Account: $30,000. Risk: 0.5% = $150. Entry: $5.20. Stop: $4.90. Stop distance: $0.30. Share size = $150 ÷ $0.30 = 500 shares. Maximum loss on this trade: 500 × $0.30 = $150 — exactly 0.5% of the account.') +
    h2('1.3 Working Through Five Scenarios') +
    dataTable(['Account','Risk %','Risk $','Entry','Stop','Stop distance','Share size','Max loss'],
      [['$25,000','0.5%','$125','$3.50','$3.20','$0.30','416 shares','$124.80'],
       ['$25,000','0.5%','$125','$8.00','$7.60','$0.40','312 shares','$124.80'],
       ['$30,000','0.5%','$150','$2.10','$1.85','$0.25','600 shares','$150.00'],
       ['$30,000','1.0%','$300','$5.00','$4.70','$0.30','1,000 shares','$300.00'],
       ['$50,000','0.5%','$250','$12.00','$11.50','$0.50','500 shares','$250.00']]) +
    p('Notice that share size goes DOWN when the stop distance is wider and UP when the stop distance is tighter. This is intentional — wider stops mean more risk per share, so you must take fewer shares to keep the total dollar risk the same.') +
    callout('red','Critical rule','Never size a trade based on how many shares you want to own or how much you hope to make. Always size based on how much you can afford to lose. The share size is an output of the formula — not an input. If the formula says 200 shares and you want to buy 1,000, you are taking 5x your planned risk.');
}

function buildM5L2() {
  return obj('By the end of this lesson you will understand how daily loss limits work at CREDO, what happens when you hit them, and why they are a rule rather than a guideline.') +
    h2('2.1 What is a Daily Loss Limit?') +
    p('A daily loss limit is the maximum amount you are allowed to lose in a single trading session. When you hit it, your trading day is over. No more trades — not one — until the next session. This is enforced at CREDO by the IB Risk Navigator (covered in Lesson 6) and monitored during live sessions by your mentor.') +
    p('The CREDO daily loss limits:') +
    defTable([
      ['Paper trading limit','1.5% of your paper account size. On a $30,000 paper account: $450. When you have lost $450, the session ends.'],
      ['Live trading limit (Phase 2+)','2% of your live account size. On a $30,000 live account: $600. Enforced by IB Risk Navigator auto-flat.'],
      ['Mentor SMS threshold','Your mentor receives an SMS at 50%, 75%, and 100% of your daily limit. At 100%, a call is scheduled.'],
    ]) +
    h2('2.2 Why the Daily Limit Is a Rule, Not a Guideline') +
    p('New traders always believe their daily loss limit is a suggestion — something they will respect on most days but override when they are "close to recovering." This belief has destroyed more trading accounts than any bad setup ever has.') +
    p('Here is the math that changes how you think about this. If your account is $30,000 and you lose $1,500 in one session (5%), you now need to make $1,578 just to get back to $30,000 — because your new account balance of $28,500 requires a larger percentage gain. The deeper you dig, the harder it is to recover.') +
    twoCol('The 1.5% daily limit','Maximum loss per session. On a $30,000 account = $450. If you lose $450 across 20 sessions, total loss is $9,000. Account remains $21,000 — still tradeable, still recoverable with discipline.','No daily limit','A trader who loses 5% per day for just 10 bad sessions loses over 40% of their account. $30,000 becomes $17,500. Recovery from this requires a 71% gain — a near-impossible task for a beginner.','green','red') +
    callout('amber','What happens when you hit the limit','Stop trading immediately. Close all open positions. Post in Discord #daily-review: "Hit daily limit. Session done." Your mentor will review the session with you in your next one-on-one call. There is no judgment — hitting the limit occasionally is expected in early training. Refusing to stop is a violation.') +
    h2('2.3 The Alert Thresholds') +
    p('The IB Risk Navigator sends alerts at three points during the day. Learn to respond to each one:') +
    dataTable(['Threshold','Action required'],
      [['50% of daily limit ($225 on $30K paper)','Slow down. Review your last two trades in TraderVue. Are you trading your plan or chasing?'],
       ['75% of daily limit ($337 on $30K paper)','Mandatory 15-minute break. Step away from the screen. Come back with fresh eyes or end the session.'],
       ['100% of daily limit ($450 on $30K paper)','Session ends immediately. Flatten all positions. Post in Discord. No exceptions.']]);
}

function buildM5L3() {
  return obj('By the end of this lesson you will understand the mathematics of drawdown and why protecting your account from large losses is more important than capturing large gains.') +
    h2('3.1 What is Drawdown?') +
    p('Drawdown is the decline from a peak account balance to a subsequent trough. If your account grows to $32,000 then falls to $27,000 before recovering, you experienced a $5,000 drawdown — or 15.6% of the peak value. Drawdown is the most important measure of trading risk because it captures the worst possible experience a strategy produces.') +
    h2('3.2 The Cost of Drawdown — The Math That Changes Everything') +
    p('The critical insight about drawdown is that losses and gains are not symmetric. Losing 20% requires a 25% gain just to break even. Losing 50% requires a 100% gain. The deeper the hole, the harder the climb out.') +
    dataTable(['Loss suffered','Gain required to recover','Why this is devastating'],
      [['10%','11.1%','Manageable with consistent trading'],
       ['20%','25.0%','Requires above-average performance to recover'],
       ['30%','42.9%','Difficult — requires exceptional performance'],
       ['40%','66.7%','Very difficult — most beginners do not recover'],
       ['50%','100.0%','Must double the remaining account — near impossible for a beginner'],
       ['75%','300.0%','Effectively career-ending for most traders']]) +
    callout('red','The lesson','A 1.5% daily loss limit exists precisely to prevent the kind of drawdown that makes recovery impossible. One bad session capped at 1.5% is recoverable in a week of normal trading. One uncontrolled session at 20% may never be recovered. Protecting capital is not defensive thinking — it is the highest-priority trading skill.') +
    h2('3.3 The Weekly Loss Limit') +
    p('In addition to the daily limit, CREDO has a weekly loss limit:') +
    defTable([
      ['Paper trading weekly limit','3% of account. On a $30,000 paper account: $900 per week.'],
      ['Live trading weekly limit','5% of account. On a $30,000 live account: $1,500 per week.'],
      ['Consequence of hitting weekly limit','Paper trading only for the rest of the week. A written self-review must be completed and submitted to your mentor before trading resumes.'],
    ]) +
    p('The weekly limit catches a pattern the daily limit alone cannot: a trader who loses 1.4% every day for five days (just under the daily limit each time) has lost 7% for the week. The weekly limit is a circuit breaker for consistent underperformance, not just single-session disasters.') +
    h2('3.4 Drawdown Recovery Protocol') +
    p('If you hit your weekly loss limit, the following protocol applies before the following Monday:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Pull your TraderVue report for the week. Print or screenshot it.</li>' +
      '<li>Write a one-page review: What setups did you take? Were they on the pre-market watchlist? Where were your stops? Did you honor them?</li>' +
      '<li>Identify the single biggest mistake of the week — not the biggest loss, but the worst decision.</li>' +
      '<li>Write one rule you will follow next week specifically to avoid repeating that mistake.</li>' +
      '<li>Submit to your mentor in your private Discord channel before Sunday night.</li>' +
    '</ol>' +
    callout('green','Why this protocol matters','The written review forces you to process the loss analytically rather than emotionally. Traders who skip this step come back the following week trying to "get even" — and usually make the drawdown worse. The review is not punishment. It is the mechanism that turns a bad week into a learning event.');
}

function buildM5L4() {
  return obj('By the end of this lesson you will be able to calculate the true break-even on any trade by accounting for both the bid/ask spread and IB commissions, and understand how these costs affect your minimum required price move.') +
    h2('4.1 The Hidden Costs of Every Trade') +
    p('When you buy a stock at $5.20 and sell it at $5.40, your gross profit is $0.20 per share. But this is not your net profit. Two costs are extracted before you see the money: the bid/ask spread and commissions. Failing to account for these costs leads to a distorted picture of your performance — especially on small-cap stocks where spreads can be wide.') +
    h2('4.2 The Bid/Ask Spread Cost') +
    p('When you buy at the ask and sell at the bid, you pay the spread twice — once on entry and once on exit. The spread cost is the round-trip cost of the spread.') +
    p('Example: Stock XYZ has a bid of $5.00 and an ask of $5.10. The spread is $0.10. If you buy 500 shares at $5.10 (ask) and immediately sell at $5.00 (bid), you lose $50 on the spread alone — before the stock moves even one penny.') +
    defTable([
      ['Spread on entry','You buy at the ask price, which is always higher than the midpoint.'],
      ['Spread on exit','You sell at the bid price, which is always lower than the midpoint.'],
      ['Round-trip spread cost','Spread × shares × 2 (both sides). On a $0.10 spread with 500 shares: $0.10 × 500 = $50.'],
    ]) +
    callout('amber','Small-cap spreads','On actively traded large-cap stocks, spreads are often $0.01-$0.02. On small-cap stocks during volatile pre-market periods, spreads can widen to $0.20, $0.50, or even $1.00. A $0.50 spread on a 500-share position = $250 round-trip spread cost. Your target must be at least $0.50 just to break even.') +
    h2('4.3 The Full Break-Even Calculation') +
    p('Break-even per share = (Spread cost + Total commissions) ÷ Shares') +
    p('Full example: 500 shares of a $5 stock with a $0.10 spread, IB commission at $0.005/share.') +
    ul(['Spread cost: 500 shares × $0.10 = $50.00',
        'Commission on buy: 500 × $0.005 = $2.50',
        'Commission on sell: 500 × $0.005 = $2.50',
        'Total costs: $50 + $2.50 + $2.50 = $55.00',
        'Break-even per share: $55.00 ÷ 500 = $0.11',
        'The stock must move AT LEAST $0.11 in your favor just to break even.']) +
    dataTable(['Spread','Shares','Spread cost','Commissions','Total cost','Break-even move'],
      [['$0.05','500','$25.00','$5.00','$30.00','$0.06/share'],
       ['$0.10','500','$50.00','$5.00','$55.00','$0.11/share'],
       ['$0.20','500','$100.00','$5.00','$105.00','$0.21/share'],
       ['$0.10','1000','$100.00','$10.00','$110.00','$0.11/share']]) +
    callout('green','Key insight','Before entering any trade, calculate your break-even move. If your target is $0.30 per share and the break-even is $0.15, you need a $0.15 net move to profit. If the break-even is $0.25 and your target is $0.30, the risk/reward is terrible — a $0.05 net gain versus a $0.30 gross risk. The math must work before you enter.');
}

function buildM5L5() {
  return obj('By the end of this lesson you will be able to build a complete bracket order in Interactive Brokers — entry, stop, and target submitted simultaneously — and understand why this is the only acceptable way to enter a trade at CREDO.') +
    h2('5.1 What is a Bracket Order?') +
    p('A bracket order is three orders submitted simultaneously as a group: the entry order, a stop loss order that triggers if the trade goes against you, and a profit target order that closes the trade when your target is reached. Once submitted, whichever of the two exit orders fills first automatically cancels the other.') +
    p('The bracket order is the foundation of CREDO risk management. It means that the moment you enter a trade, your maximum loss is already defined and your exit plan is already in the market — without any further action required from you.') +
    twoCol('Without a bracket order','You enter the trade. The stock moves against you. You hesitate — hoping it will recover. It drops further. You finally exit, having lost 3x your planned maximum. This is how accounts are blown.','With a bracket order','You enter the trade with a stop and target already set. If the stock drops to your stop, it sells automatically. If it reaches your target, it sells automatically. You cannot hold a loser past your planned exit.','red','green') +
    h2('5.2 Building a Bracket Order in IB TWS') +
    p('In Trader Workstation (TWS), bracket orders are built as follows:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Click on the stock in your watchlist to open the order entry row.</li>' +
      '<li>Select order type: LMT (Limit). Set your entry price at or near the current ask.</li>' +
      '<li>Right-click the order row → Attach → Bracket Order. TWS adds two child orders below the entry.</li>' +
      '<li>Set the stop loss child order: LMT or STP. Enter your stop price (e.g. $0.30 below entry).</li>' +
      '<li>Set the profit target child order: LMT. Enter your target price (e.g. $0.60 above entry).</li>' +
      '<li>Review all three prices. Check share size on all three — they must match.</li>' +
      '<li>Click Transmit. All three orders go live simultaneously.</li>' +
    '</ol>' +
    callout('amber','Common mistake','New traders often set the bracket correctly but forget to check that all three orders have the same share size. If your entry is 500 shares but your stop is 100 shares, the stop only covers 20% of your position. The remaining 400 shares have no protection. Always verify share sizes before transmitting.') +
    h2('5.3 Managing the Bracket After Entry') +
    p('Once your bracket is live, here is the only intervention allowed:') +
    defTable([
      ['Moving the stop UP','If the trade goes in your favor and you want to lock in a profit, you may move the stop up — never down. Moving a stop down to give a trade "more room" is a violation of risk management rules.'],
      ['Scaling out','You may cancel the profit target on partial shares and sell them manually at a higher price while keeping the remainder in the bracket. This is an advanced technique — reviewed with your mentor before use.'],
      ['Full cancellation','If you decide to exit the trade early (e.g. you see a bearish candle developing), you may cancel the bracket and exit manually. Always exit the full position — do not leave partial shares without a bracket.'],
    ]) +
    callout('red','Non-negotiable rule','At CREDO, every trade must be entered with a bracket order from Week 3 of training onward. Any trade entered without a simultaneous stop loss is a bracket violation. Bracket violations are reviewed in the next mentor call without exception. The rule is not about trust — it is about building the habit that protects your account when your emotions are running hot.');
}

// ══ MODULE 6 LESSONS ══
function buildM6L1() {
  return obj('By the end of this lesson you will be able to identify revenge trading and winner\'s tilt as they are happening, understand the brain state that produces each, and apply the specific interventions that stop both patterns before they damage your account.') +
    h2('1.1 The Two Patterns That Destroy Accounts') +
    p('Of all the psychological patterns that cause traders to lose money, revenge trading and winner\'s tilt are the two most destructive — and the two most common. They are dangerous because they do not feel like mistakes while they are happening. They feel like confidence, urgency, or righteous recovery. Understanding them intellectually is the first step. Catching them in real time is the skill.') +
    h2('1.2 Revenge Trading') +
    p('Revenge trading occurs after a losing trade when a trader immediately takes another position — usually larger, faster, and with less research — in an attempt to recover the loss. The name is accurate: it feels like you are fighting back against the market that just took your money.') +
    defTable([
      ['What triggers it','A loss that feels unfair, unexpected, or embarrassing. The emotional experience of being wrong.'],
      ['What it feels like','Urgency. Certainty. The strong sense that the next trade will work. A need to act immediately.'],
      ['What it actually is','An emotionally driven decision made while the prefrontal cortex — the rational brain — is temporarily offline due to loss aversion.'],
      ['What it produces','A second loss, often larger than the first, compounding the damage and deepening the emotional hole.'],
    ]) +
    p('The signature of revenge trading is speed. If you lose a trade and enter the next one in less than 60 seconds without reviewing your thesis, checking the scanner, and confirming a valid setup — that is revenge trading, regardless of whether the trade works.') +
    callout('red','The revenge trade rule','After any loss, you must wait a minimum of 5 minutes before entering another trade. Use that time to: review what happened in TraderVue, confirm a valid setup exists on the scanner, and rate your emotional state (1-5). If your emotional state is 2 or below, the session is over. This is not optional.') +
    h2('1.3 Winner\'s Tilt') +
    p('Winner\'s tilt is the opposite of revenge trading — and equally dangerous. It occurs after a winning trade when a trader becomes overconfident and begins taking progressively larger, faster, or lower-quality setups. The winning trade creates a feeling of invincibility that temporarily distorts risk perception.') +
    p('Winner\'s tilt is harder to catch than revenge trading because it feels good. You are not angry — you are excited. You are not trying to recover a loss — you are trying to extend a win. The emotional state that produces winner\'s tilt is indistinguishable from genuine confidence to the person experiencing it.') +
    twoCol('Genuine confidence','Based on a clear setup, a confirmed catalyst, proper position sizing, and a defined stop. You can articulate exactly why you are entering before you click. The trade fits your criteria.','Winner\'s tilt','Based on the feeling that you are "hot" today and anything you touch will work. Entry criteria are relaxed. Position size may be increased beyond your formula. Stop is widened or absent.','green','red') +
    callout('amber','How to catch it','After your second profitable trade in a day, pause for 60 seconds before entering a third. Ask yourself: does this next setup meet the same criteria as the first two? Or am I entering because I feel good? If you cannot clearly articulate the setup, catalyst, and stop distance before clicking — do not enter. Winner\'s tilt lives in that hesitation.');
}

function buildM6L2() {
  return obj('By the end of this lesson you will recognize FOMO and hope as distinct psychological patterns, understand exactly what brain state produces each, and have a concrete response protocol for both.') +
    h2('2.1 FOMO — Fear of Missing Out') +
    p('FOMO is the emotional experience of watching a stock move without you and feeling compelled to enter anyway — despite the fact that the original setup no longer exists. The stock has already moved. The entry you planned is gone. But the fear of missing further upside overrides your rational evaluation.') +
    p('FOMO entries are characterized by three things: they happen after a significant move has already occurred, they lack a clear defined stop because the setup is no longer clean, and they feel urgent — like the window is closing and you must act now.') +
    defTable([
      ['The FOMO trigger','A stock on your watchlist spikes 20% in the first 5 minutes. You did not enter at your planned level because you were watching. Now it is running and you did not get in.'],
      ['The FOMO thought','If I do not buy now I will miss the whole move. It is still going up. I will just buy here and trail my stop.'],
      ['The FOMO reality','You are entering at the worst possible time — extended, with no clean level to stop against, with every early buyer sitting on profit and looking to exit into your buying.'],
      ['The FOMO outcome','The stock pauses or reverses. You exit at a loss. The original planned entry — the one you skipped — would have been profitable. You lost money on a stock you were right about.'],
    ]) +
    callout('green','The FOMO rule','If you missed the entry, you missed the trade. There is no second entry on a FOMO move. Write in your journal: "Missed ABCD setup at $X — did not chase." That journal entry is worth more than a chased trade. Over 30 sessions, your missed setup log will show you the true cost of FOMO — which is zero, because you never entered.') +
    h2('2.2 Hope as a Position Management Strategy') +
    p('Hope is what replaces your stop loss when you remove it. A trader who enters a trade with a stop at $4.90, watches the stock drop to $4.80, and thinks "I\'ll give it a little more room" — is no longer managing a trade. They are hoping.') +
    p('Hope is not a trading strategy. It is the absence of one. And unlike every other psychological pattern covered in this module, hope compounds over time. The longer you hold a losing position without a stop, the larger the loss becomes, and the more hope you need to justify staying in. This is how small losses become account-destroying losses.') +
    ul(['Hope thought #1: "It will come back — it always does."','Hope thought #2: "I\'ll hold through the dip — my thesis is still valid."','Hope thought #3: "If I sell now I lock in the loss. I\'ll wait for the recovery."','Hope thought #4: "It is close to support — I\'ll add more to average down."']) +
    callout('red','The hardest rule in trading','When your stop is hit, you sell. Not because the thesis is definitely wrong. Not because you are giving up. Because you decided the price at which you were wrong before you entered, and that price has been reached. The stop is the pre-commitment device that makes decisions in advance, when you are rational, so that you do not have to make them in the moment, when you are not.');
}

function buildM6L3() {
  return obj('By the end of this lesson you will understand outcome bias and confirmation bias, why they are particularly dangerous for trading, and how to use process-based evaluation to avoid both.') +
    h2('3.1 Outcome Bias') +
    p('Outcome bias is the tendency to evaluate the quality of a decision based on its result rather than the quality of the process that produced it. In trading, this means judging a trade as "good" if it made money and "bad" if it lost money — regardless of whether it was executed correctly.') +
    p('This is one of the most dangerous thinking patterns in trading because it causes you to repeat mistakes that happened to work out and abandon correct processes that happened to produce losses.') +
    twoCol('Good process, losing trade','You followed the checklist. The setup had all 6 criteria. You sized correctly. You used a bracket order. The stock reversed on unexpected news and hit your stop. Result: -$120. Grade: A. This was a perfect trade.','Bad process, winning trade','You chased a FOMO move with no clear stop. The stock kept running and you made $300. Result: +$300. Grade: F. This was a terrible trade that happened to work. Repeating it will eventually produce a large loss.','green','red') +
    callout('green','Process over outcome','In TraderVue, evaluate every trade on process: Did I have a pre-market thesis? Did I enter at my planned level? Did I use a bracket order? Did I honor my stop? A "yes" to all four is a perfect trade regardless of P&L. A "no" to any one is a flawed trade regardless of P&L.') +
    h2('3.2 Confirmation Bias') +
    p('Confirmation bias is the tendency to seek out, interpret, and remember information that confirms your existing belief — and ignore information that contradicts it. In trading, this is most dangerous when you already have a position open.') +
    p('A trader who is long a stock will naturally notice every bullish piece of news, every green candle, every analyst upgrade — and tend to discount the bearish signals. This is not dishonesty. It is how the human brain processes information under uncertainty, especially when money is involved.') +
    defTable([
      ['Pre-trade bias','Researching a stock and only reading bullish information. Ignoring the S-3 filing because "the catalyst is strong enough."'],
      ['In-trade bias','Holding a losing position and finding reasons it will recover while ignoring the deteriorating price action.'],
      ['Post-trade bias','Remembering your winning trades in detail while the losing trades fade from memory — making your mental record of performance more positive than reality.'],
    ]) +
    h2('3.3 The Antidote — Pre-Mortem Thinking') +
    p('The most effective counter to confirmation bias is pre-mortem thinking: before entering any trade, spend 30 seconds arguing the opposite case. Ask yourself: why is this trade wrong? What would have to be true for this stock to go down instead of up? What am I not seeing?') +

function buildPTL6_3() {
  return obj('By the end of this session you will understand the expectancy and execution score requirements in detail and how they are calculated for gate clearance.') +
    h2('Expectancy Requirement') +
    p('Your assigned setup must show positive expectancy calculated from your TraderVue data. The calculation:') +
    p('Expectancy = (Win rate × average winner) minus (Loss rate × average loser)') +
    p('This must be calculated on trades tagged with your assigned setup only — not your overall account P&L. A student can have overall negative P&L and still clear this criterion if their assigned setup has positive expectancy, because the negative P&L came from unplanned trades.') +
    callout('amber','Minimum sample size','The expectancy calculation must be based on at least 20 trades on your assigned setup. If you have only 15 tagged setup trades out of 30 total, you need more setup-tagged trades before this criterion can be evaluated.') +
    h2('Execution Score Requirement') +
    p('Your scorecard average across the last 15 qualifying trades must be 3.0 or higher out of 4. This is a trailing metric — it applies to the 15 most recent trades, not your all-time average. This means a student who starts poorly but improves consistently can clear this criterion even if their early scores were low.') +
    callout('green','What 3.0 average means','A 3.0 average across 15 trades means you are scoring 3 or 4 on most trades and only occasionally scoring 2. It means your entry, stop, and exit execution is consistently near the defined standard. It does not mean perfection — a 4/4 trade every time is the goal but not the gate.');
}
