<html lang="en">
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--panel:#161b27;--card:#1e2535;--card2:#1a2030;
  --border:#243044;--border-hi:#2d3d57;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --cyan:#06b6d4;--orange:#f59e0b;--purple:#8b5cf6;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --radius:10px;--radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;}

/* ── SIDEBAR (same as courses.html) ── */
.sidebar{width:240px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:100vh;transition:width .25s cubic-bezier(.4,0,.2,1);}
.sidebar.collapsed{width:58px;}
.sidebar.collapsed .sb-wordmark,.sidebar.collapsed .sb-label,.sidebar.collapsed .sb-uname,.sidebar.collapsed .sb-urole{display:none;}
.sidebar.collapsed .sb-item{padding:10px 0;justify-content:center;gap:0;}
.sidebar.collapsed .sb-bottom{padding:10px 6px;display:flex;justify-content:center;}
.sidebar.collapsed .sb-logo-area{padding:16px 0;justify-content:center;}
.sidebar.collapsed .sb-logo{justify-content:center;}
.sidebar.collapsed .sb-item{position:relative;}
.sidebar.collapsed .sb-item:hover::after{content:attr(data-label);position:absolute;left:62px;top:50%;transform:translateY(-50%);background:var(--card);color:var(--t1);font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;white-space:nowrap;pointer-events:none;border:1px solid var(--border-hi);z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.sb-logo-area{height:52px;padding:0 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:10px;}
.sb-logo-mark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#0f2040,#1a3a6b);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;}
.sb-logo-mark svg{width:24px;height:24px;}
.sb-wordmark{font-size:19px;font-weight:800;letter-spacing:-.4px;color:var(--t1);}
.sb-wordmark span{color:var(--green);}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.sb-scroll::-webkit-scrollbar{width:0;}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;font-size:15px;font-weight:500;color:var(--t2);transition:all .12s;}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--t1);}
.sb-item.active{background:rgba(34,197,94,.06);color:var(--green);box-shadow:inset 3px 0 0 var(--green);}
.sb-icon{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.sb-bottom{padding:14px 18px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:9px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green);}
.sb-uname{font-size:14px;font-weight:600;color:var(--t1);}
.sb-urole{font-size:11px;color:var(--t3);}
.sb-logout-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;margin-left:auto;flex-shrink:0;border-radius:7px;border:none;background:transparent;cursor:pointer;color:var(--t3);transition:all .15s;}
.sb-logout-btn:hover{background:rgba(239,68,68,.1);color:var(--red);}
.sidebar.collapsed .sb-logout-btn{margin:0 auto;}
.sidebar-wrap{position:relative;flex-shrink:0;}
.sb-toggle-btn{position:absolute;top:72px;right:-14px;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border-hi);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;color:var(--t2);transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.35);}
.sb-toggle-btn:hover{background:var(--green);border-color:var(--green);color:#000;}

/* ── HEADER ── */
.main-content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.header{height:52px;background:rgba(15,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.header-back{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;padding:5px 10px;border-radius:7px;transition:all .15s;border:none;background:transparent;}
.header-back:hover{background:rgba(255,255,255,.05);color:var(--t1);}
.header-divider{width:1px;height:20px;background:var(--border);}
.header-crumb{font-size:13px;color:var(--t3);}
.header-crumb span{color:var(--t1);font-weight:600;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.session-clock{font-size:13px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.15);padding:4px 11px;border-radius:7px;}
.username-chip{font-size:10px;font-weight:600;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);padding:4px 10px;border-radius:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── LESSON LAYOUT ── */
.lesson-layout{flex:1;min-height:0;display:flex;overflow:hidden;}

/* ── LESSON NAV PANEL ── */
.lesson-nav{width:260px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.lesson-nav-header{padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lesson-nav-mod{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.lesson-nav-title{font-size:16px;font-weight:700;color:var(--t1);line-height:1.35;}
.lesson-nav-meta{font-size:13px;color:var(--t3);margin-top:4px;}
.lesson-nav-progress{margin-top:10px;}
.lesson-nav-bar-wrap{height:3px;background:var(--card2);border-radius:2px;overflow:hidden;}
.lesson-nav-bar{height:100%;border-radius:2px;background:var(--green);transition:width .4s ease;}
.lesson-nav-pct{font-size:13px;color:var(--t3);margin-top:4px;}
.lesson-list{flex:1;overflow-y:auto;padding:8px 0;}
.lesson-list::-webkit-scrollbar{width:3px;}
.lesson-list::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.lesson-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:all .12s;position:relative;}
.lesson-item:hover{background:rgba(255,255,255,.04);}
.lesson-item.active{background:rgba(34,197,94,.06);}
.lesson-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:0 2px 2px 0;}
.lesson-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:1.5px solid var(--border-hi);background:var(--card2);color:var(--t3);transition:all .3s;}
.lesson-dot.done{background:var(--green);border-color:var(--green);color:#000;}
.lesson-dot.done::after{content:"✓";}
.lesson-dot.active{border-color:var(--cyan);background:rgba(6,182,212,.1);color:var(--cyan);}
.lesson-dot.active::after{content:"●";font-size:6px;}
.lesson-item-text{font-size:15px;font-weight:500;color:var(--t2);line-height:1.4;flex:1;}
.lesson-item.active .lesson-item-text{color:var(--t1);}
.lesson-item.done-item .lesson-item-text{color:var(--t3);}
.lesson-nav-footer{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;}


/* ── LESSON CONTENT ── */
.lesson-content{flex:1;min-width:0;overflow-y:auto;display:flex;flex-direction:column;background:#ffffff;}
.lesson-content::-webkit-scrollbar{width:3px;}
.lesson-content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
.lesson-body{flex:1;padding:40px 56px;max-width:860px;}
.lesson-num{font-size:13px;font-weight:700;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.lesson-h1{font-size:30px;font-weight:800;color:#0f172a;letter-spacing:-.6px;line-height:1.2;margin-bottom:10px;}
.lesson-obj{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid #3b82f6;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:28px;font-size:15px;color:#1d4ed8;line-height:1.7;}
.lesson-obj strong{font-weight:700;}
.lesson-h2{font-size:18px;font-weight:700;color:#1e293b;margin:28px 0 10px;letter-spacing:-.3px;border-bottom:2px solid #e2e8f0;padding-bottom:6px;}
.lesson-h3{font-size:15px;font-weight:700;color:#334155;margin:20px 0 8px;}
.lesson-p{font-size:16px;color:#334155;line-height:1.9;margin-bottom:14px;}
.lesson-ul{margin:8px 0 12px 20px;display:flex;flex-direction:column;gap:6px;}
.lesson-ul li{font-size:16px;color:#334155;line-height:1.8;}
.lesson-ul li::marker{color:#16a34a;}

/* callout boxes */
.callout{border-radius:8px;padding:16px 20px;margin:18px 0;font-size:15px;line-height:1.8;display:flex;gap:12px;align-items:flex-start;}
.callout-icon{flex-shrink:0;margin-top:1px;}
.callout-body{flex:1;}
.callout-title{font-weight:700;margin-bottom:3px;}
.callout.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;}
.callout.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.callout.amber{background:#fffbeb;border:1px solid #fde68a;color:#b45309;}
.callout.red{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;}

/* two-col comparison */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.col-box{border-radius:8px;padding:16px 18px;font-size:15px;line-height:1.8;}
.col-box.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;}
.col-box.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.col-box-title{font-weight:700;margin-bottom:6px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;}

/* definition table */
.def-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:15px;}
.def-table th{background:#dbeafe;color:#1e40af;font-weight:700;padding:10px 14px;text-align:left;border:1px solid #bfdbfe;}
.def-table td{padding:9px 14px;border:1px solid #e2e8f0;color:#334155;line-height:1.6;vertical-align:top;}
.def-table td:first-child{font-weight:600;color:#0f172a;white-space:nowrap;width:180px;}
.def-table tr:nth-child(even) td{background:#f8fafc;}

/* three-col table */
.data-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:15px;}
.data-table th{background:#dbeafe;color:#1e40af;font-weight:700;padding:10px 14px;text-align:left;border:1px solid #bfdbfe;}
.data-table td{padding:9px 14px;border:1px solid #e2e8f0;color:#334155;line-height:1.6;}
.data-table tr:nth-child(even) td{background:#f8fafc;}

/* ── LESSON FOOTER ── */
.lesson-footer{padding:24px 48px;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-shrink:0;background:#f8fafc;}
.lesson-footer-info{flex:1;font-size:14px;color:#64748b;}
.lesson-footer-info span{color:#0f172a;font-weight:600;}
.prev-btn{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:10px 22px;border-radius:8px;border:1px solid #cbd5e1;background:#ffffff;color:#475569;cursor:pointer;transition:all .15s;}
.prev-btn:hover{background:rgba(255,255,255,.04);color:var(--t1);}
.prev-btn:disabled{opacity:.3;cursor:default;}
.next-btn{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;padding:11px 30px;border-radius:8px;border:none;background:var(--green);color:#000;cursor:pointer;transition:all .15s;}
.next-btn:hover{opacity:.88;}
.next-btn.finish{background:var(--cyan);color:#000;}
.complete-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:6px 12px;border-radius:7px;}

/* ── MODAL (auth) ── */
.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--panel);border:1px solid var(--border-hi);border-radius:16px;padding:36px;width:420px;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;}
.modal-box::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,197,94,.4),rgba(6,182,212,.4),transparent);}
.modal-logo{display:flex;align-items:center;gap:12px;}
.modal-logo-mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#0f2040,#1a3a6b);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;}
.modal-title{font-size:20px;font-weight:800;color:var(--t1);}
.modal-title span{color:var(--green);}
.modal-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.modal-divider{height:1px;background:var(--border);}
.tab-row{display:flex;border:1px solid var(--border-hi);border-radius:8px;overflow:hidden;}
.auth-tab{flex:1;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:9px;border:none;background:var(--card);color:var(--t3);cursor:pointer;transition:all .15s;}
.auth-tab.active{background:var(--blue);color:#fff;}
.modal-input-group{display:flex;flex-direction:column;gap:10px;}
.modal-input{font-family:'Inter',sans-serif;font-size:13px;background:var(--card);border:1px solid var(--border-hi);color:var(--t1);padding:11px 14px;border-radius:8px;outline:none;transition:border-color .15s;width:100%;}
.modal-input:focus{border-color:var(--green);}
.modal-input::placeholder{color:var(--t3);}
.modal-role-row{display:flex;gap:8px;}
.role-btn{flex:1;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:9px;border-radius:7px;border:1px solid var(--border-hi);background:var(--card);color:var(--t3);cursor:pointer;transition:all .15s;text-align:center;}
.role-btn.active{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green);}
.modal-join-btn{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;padding:13px;border-radius:9px;border:none;background:var(--green);color:#000;cursor:pointer;}
.modal-error{font-size:11px;color:var(--red);padding:8px 12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:7px;display:none;}
.forgot-link{text-align:right;margin-top:-4px;}
.forgot-link span{font-size:11px;color:var(--blue);cursor:pointer;}
</style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <div class="modal-logo">
      <div class="modal-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/><circle cx="19" cy="18" r="3" fill="#22c55e"/></svg></div>
      <div><div class="modal-title">TradeRoom <span>PRO</span></div><div class="modal-sub" id="modalSubtitle">Sign in to continue</div></div>
    </div>
    <div class="modal-divider"></div>
    <div class="tab-row">
      <button id="tabLogin" class="auth-tab active" onclick="showTab('login')">Sign In</button>
      <button id="tabRegister" class="auth-tab" onclick="showTab('register')">Create Account</button>
    </div>
    <div id="formLogin" class="modal-input-group">
      <input class="modal-input" id="loginEmail" type="text" placeholder="Email address" inputmode="email" onkeydown="if(event.key==='Enter')handleAuth()"/>
      <input class="modal-input" id="loginPassword" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')handleAuth()"/>
      <div class="forgot-link"><span onclick="forgotPassword()">Forgot password?</span></div>
    </div>
    <div id="formRegister" class="modal-input-group" style="display:none;">
      <input class="modal-input" id="regName" type="text" placeholder="Display name" maxlength="24"/>
      <input class="modal-input" id="regEmail" type="text" placeholder="Email address" inputmode="email"/>
      <input class="modal-input" id="regPassword" type="password" placeholder="Password (min 6 chars)" onkeydown="if(event.key==='Enter')handleAuth()"/>
      <div class="modal-role-row">
        <button class="role-btn active" id="roleStudent" onclick="setRole('student')">🎓 Student</button>
        <button class="role-btn" id="roleInstructor" onclick="setRole('instructor')">⭐ Instructor</button>
      </div>
    </div>
    <div class="modal-error" id="modalError"></div>
    <button class="modal-join-btn" id="authBtn" onclick="handleAuth()">Enter Trading Room →</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar-wrap">
<nav class="sidebar" id="sidebar">
  <div class="sb-logo-area">
    <div class="sb-logo">
      <div class="sb-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#00d97e" stroke-width="2" stroke-linecap="round"/><circle cx="19" cy="18" r="3" fill="#00d97e"/></svg></div>
      <div class="sb-wordmark">TradeRoom<span> PRO</span></div>
    </div>
  </div>
  <div class="sb-scroll">
    <div class="sb-item" data-label="Dashboard" onclick="window.location.href='trading-dashboard.html'"><span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span><span class="sb-label">Dashboard</span></div>
    <div class="sb-item" data-label="Scanners" onclick="window.location.href='scanners.html'"><span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><span class="sb-label">Scanners</span></div>
    <div class="sb-item" data-label="Charting" onclick="window.location.href='chart.html'"><span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg></span><span class="sb-label">Charting</span></div>
    <div class="sb-item" data-label="YouTube" onclick="window.location.href='youtube.html'"><span class="sb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16 10,8" fill="currentColor" stroke="none"/></svg></span><span class="sb-label">YouTube</span></div>

// ══ STATE ══
var currentUser = null;
var userProgress = {};
var currentModIdx = 0;
var currentLessonIdx = 0;

// ══ URL PARAMS ══
function getParams() {
  var p = new URLSearchParams(window.location.search);
  var mod    = parseInt(p.get('mod')    || '0');
  var lesson = parseInt(p.get('lesson') || '0');
  if (isNaN(mod))    mod    = 0;
  if (isNaN(lesson)) lesson = 0;
  return {
    mod:    Math.max(0, Math.min(11, mod)),
    lesson: Math.max(0, Math.min(5, lesson))
  };
}

function setParams(mod, lesson) {
  var url = new URL(window.location.href);
  url.searchParams.set('mod', mod);
  url.searchParams.set('lesson', lesson);
  window.history.replaceState({}, '', url);
}

// ══ RENDER ══
function renderPage() {
  // Safety guards
  if (currentModIdx < 0 || currentModIdx >= MODULES.length) currentModIdx = 0;
  if (currentLessonIdx < 0 || currentLessonIdx >= MODULES[currentModIdx].lessons.length) currentLessonIdx = 0;

  var mod = MODULES[currentModIdx];
  var lesson = mod.lessons[currentLessonIdx];
  var p = userProgress[mod.id] || { pct: 0, lessonsComplete: [] };
  var done = p.lessonsComplete || [];

  // Header
  document.getElementById('headerCrumb').innerHTML = 'Foundation Course &rsaquo; <span>' + mod.title + '</span>';

  // Nav header
  document.getElementById('navModNum').textContent = 'Module ' + mod.id;
  document.getElementById('navModTitle').textContent = mod.title;
  document.getElementById('navModMeta').textContent = mod.lessons.length + ' lessons · ' + mod.hours;
  var pct = Math.round(done.length / mod.lessons.length * 100);
  document.getElementById('navBar').style.width = pct + '%';
  document.getElementById('navPct').textContent = done.length + ' of ' + mod.lessons.length + ' complete';

  // Lesson list
  var list = document.getElementById('lessonList');
  list.innerHTML = '';
  mod.lessons.forEach(function(l, i) {
    var isDone = done.indexOf(l.id) !== -1;
    var isActive = i === currentLessonIdx;
    var item = document.createElement('div');
    item.className = 'lesson-item' + (isActive ? ' active' : '') + (isDone && !isActive ? ' done-item' : '');
    (function(idx) { item.onclick = function() { navigateLesson(idx); }; })(i);
    var dotClass = 'lesson-dot' + (isDone ? ' done' : (isActive ? ' active' : ''));
    item.innerHTML = '<div class="' + dotClass + '">' + (isDone ? '' : (isActive ? '' : (i+1))) + '</div>' +
      '<div class="lesson-item-text">' + l.title + '</div>';
    list.appendChild(item);
  });

  // Content
  document.getElementById('lessonBody').innerHTML =
    '<div class="lesson-num">Lesson ' + (currentLessonIdx+1) + ' of ' + mod.lessons.length + '</div>' +
    '<div class="lesson-h1">' + lesson.title + '</div>' +
    lesson.content;

  // Footer
  var isDoneCurrent = done.indexOf(lesson.id) !== -1;
  var isLastLesson = currentLessonIdx === mod.lessons.length - 1;
  document.getElementById('footerInfo').innerHTML =
    '<span>' + mod.title + '</span> · Lesson ' + (currentLessonIdx+1) + ' of ' + mod.lessons.length;
  document.getElementById('prevBtn').disabled = currentModIdx === 0 && currentLessonIdx === 0;

  var nextBtn = document.getElementById('nextBtn');
  if (isDoneCurrent) {
    if (isLastLesson) {
      nextBtn.textContent = 'Go to Quiz →';
      nextBtn.className = 'next-btn finish';
    } else {
      nextBtn.textContent = 'Next Lesson →';
      nextBtn.className = 'next-btn';
    }
  } else {
    if (isLastLesson) {
      nextBtn.textContent = 'Complete & Take Quiz →';
      nextBtn.className = 'next-btn finish';
    } else {
      nextBtn.textContent = 'Mark Complete & Continue →';
      nextBtn.className = 'next-btn';
    }
  }

  // Scroll to top
  document.getElementById('lessonContent').scrollTop = 0;
}

function navigateLesson(lessonIdx) {
  currentLessonIdx = lessonIdx;
  setParams(currentModIdx, currentLessonIdx);
  renderPage();
}

function prevLesson() {
  if (currentLessonIdx > 0) {
    currentLessonIdx--;
  } else if (currentModIdx > 0) {
    // Only go to previous module if it exists (always safe — previous modules are always unlocked)
    currentModIdx--;
    currentLessonIdx = MODULES[currentModIdx].lessons.length - 1;
  } else {
    // Already at very first lesson — go back to courses
    window.location.href = 'courses.html';
    return;
  }
  setParams(currentModIdx, currentLessonIdx);
  renderPage();
}

function nextLesson() {
  var mod = MODULES[currentModIdx];
  var lesson = mod.lessons[currentLessonIdx];
  var p = userProgress[mod.id] || { pct: 0, lessonsComplete: [] };
  if (!p.lessonsComplete) p.lessonsComplete = [];

  // Mark current lesson complete
  if (p.lessonsComplete.indexOf(lesson.id) === -1) {
    p.lessonsComplete.push(lesson.id);
    p.pct = Math.round(p.lessonsComplete.length / mod.lessons.length * 100);
    userProgress[mod.id] = p;
    if (currentUser) saveProgress();
  }

  var isLastLesson = currentLessonIdx === mod.lessons.length - 1;
  if (isLastLesson) {
    // All lessons done — go back to courses page for quiz
    window.location.href = 'courses.html';
    return;
  }

  currentLessonIdx++;
  setParams(currentModIdx, currentLessonIdx);
  renderPage();
}

// ══ FIREBASE PROGRESS ══
function saveProgress() {
  if (!currentUser) return;
  firebase.database().ref('traderoom/users/' + currentUser.uid + '/courseProgress').set(userProgress);
}

function loadProgress(uid, callback) {
  firebase.database().ref('traderoom/users/' + uid + '/courseProgress').get().then(function(snap) {
    if (snap.exists()) userProgress = snap.val() || {};
    // Ensure current module always has correct structure
    var modId = MODULES[currentModIdx].id;
    if (!userProgress[modId]) userProgress[modId] = { pct: 0, quizPassed: false, lessonsComplete: [] };
    if (!userProgress[modId].lessonsComplete) userProgress[modId].lessonsComplete = [];
    callback();
  }).catch(function() { callback(); });
}

var selectedRole = 'student';
function showTab(tab) {
  var l = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', l);
  document.getElementById('tabRegister').classList.toggle('active', !l);
  document.getElementById('formLogin').style.display = l ? 'flex' : 'none';

  document.getElementById('authBtn').textContent = l ? 'Sign In' : 'Create Account';
  document.getElementById('modalSubtitle').textContent = l ? 'Sign in to continue' : 'Create your TradeRoom account';
  document.getElementById('modalError').style.display = 'none';
}
function setRole(r) {
  selectedRole = r;
  document.getElementById('roleStudent').classList.toggle('active', r === 'student');
  document.getElementById('roleInstructor').classList.toggle('active', r === 'instructor');
}
function friendlyError(code) {
  var map = {
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/email-already-in-use': 'That email is already registered.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/network-request-failed': 'Network error. Please check your connection.'
  };
  return map[code] || 'Something went wrong. Please try again.';
}
function handleAuth() {
  var err = document.getElementById('modalError'); err.style.display = 'none';
  var btn = document.getElementById('authBtn'); btn.textContent = '...'; btn.disabled = true;
  var _authTimer = setTimeout(function() {
    showErr('Connection timeout. Please check your internet and try again.');
  }, 10000);
  var _origCatch = showErr;
  showErr = function(m) { clearTimeout(_authTimer); showErr = _origCatch; _origCatch(m); };
  var isLogin = document.getElementById('tabLogin').classList.contains('active');
  if (isLogin) {
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPassword').value;
    if (!email || !pass) { showErr('Please enter your email and password.'); return; }
    firebase.auth().signInWithEmailAndPassword(email, pass)
      .catch(function(e) { showErr(friendlyError(e.code)); });
  } else {
    var name = document.getElementById('regName').value.trim();
    var email2 = document.getElementById('regEmail').value.trim();
    var pass2 = document.getElementById('regPassword').value;
    if (!name || !email2 || !pass2) { showErr('Please fill in all fields.'); return; }
    if (pass2.length < 6) { showErr('Password must be at least 6 characters.'); return; }
    firebase.auth().createUserWithEmailAndPassword(email2, pass2)
      .then(function(c) {
        return firebase.database().ref('traderoom/users/' + c.user.uid)
          .set({ name: name, role: selectedRole, email: email2 });
      })
      .catch(function(e) { showErr(friendlyError(e.code)); });
  }
}
function showErr(msg) {
  var err = document.getElementById('modalError');
  err.textContent = '! ' + msg;
  err.style.color = 'var(--red)';
  err.style.display = 'block';
  var btn = document.getElementById('authBtn');
  btn.disabled = false;
  btn.textContent = document.getElementById('tabLogin').classList.contains('active') ? 'Sign In' : 'Create Account';
}
function forgotPassword() {
  var email = document.getElementById('loginEmail').value.trim();
  if (!email) { showErr('Enter your email address first.'); return; }
  firebase.auth().sendPasswordResetEmail(email)
    .then(function() {
      var e = document.getElementById('modalError');
      e.textContent = 'Reset email sent — check your inbox.';
      e.style.color = 'var(--green)';
      e.style.display = 'block';
    })
    .catch(function(e) { showErr(friendlyError(e.code)); });
}

firebase.auth().onAuthStateChanged(function(u) {
  var params = getParams();
  currentModIdx = params.mod;
  currentLessonIdx = params.lesson;

  if (!u) {
    renderPage();
    return;
  }
  currentUser = u;
  // Hide modal immediately — do not wait for DB read
  var modal = document.getElementById('loginModal');
  if (modal) modal.classList.add('hidden');
  firebase.database().ref('traderoom/users/' + u.uid).get().then(function(snap) {
    var p = snap.exists() ? snap.val() : null;
    var name = p ? p.name : u.email.split('@')[0];
    var role = p ? p.role : 'student';
    var chip = document.getElementById('userChip');
    if (chip) chip.textContent = (role === 'instructor' ? '⭐ ' : '🎓 ') + name;
    var sbA = document.getElementById('sbAvatar'), sbN = document.getElementById('sbName'), sbR = document.getElementById('sbRole');
    if (sbN) sbN.textContent = name;
    if (sbR) sbR.textContent = role === 'instructor' ? 'Instructor' : 'Student';
    if (sbA) { sbA.textContent = name.slice(0,2).toUpperCase(); sbA.style.background = role==='instructor'?'rgba(6,182,212,.15)':'rgba(139,92,246,.15)'; sbA.style.color = role==='instructor'?'#06b6d4':'#8b5cf6'; }
    loadProgress(u.uid, function() { renderPage(); });
  }).catch(function() { renderPage(); });
});

// ══ CONTENT HELPERS ══
function h2(t) { return '<h2 class="lesson-h2">' + t + '</h2>'; }
function h3(t) { return '<h3 class="lesson-h3">' + t + '</h3>'; }
function p(t) { return '<p class="lesson-p">' + t + '</p>'; }
function obj(t) { return '<div class="lesson-obj"><strong>Learning objective:</strong> ' + t + '</div>'; }
function ul(items) { return '<ul class="lesson-ul">' + items.map(function(i){return '<li>'+i+'</li>';}).join('') + '</ul>'; }
function callout(type, title, body) {
  var icons = { blue:'ℹ', green:'✓', amber:'⚠', red:'⛔' };
  return '<div class="callout ' + type + '"><div class="callout-icon">' + icons[type] + '</div><div class="callout-body"><div class="callout-title">' + title + '</div>' + body + '</div></div>';
}
function twoCol(leftTitle, leftBody, rightTitle, rightBody, leftType, rightType) {

}
function defTable(rows) {
  var html = '<table class="def-table"><thead><tr><th>Term</th><th>Definition</th></tr></thead><tbody>';
  rows.forEach(function(r) { html += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>'; });

}
function dataTable(headers, rows) {

  rows.forEach(function(r) { html += '<tr>' + r.map(function(c){return '<td>'+c+'</td>';}).join('') + '</tr>'; });
  return html + '</tbody></table>';
}

function buildLesson1() {

    h2('1.1 What is a Stock?') +
    p('A stock is a small piece of ownership in a company. When a company wants to raise money to grow — to hire more people, build a factory, or launch a new product — it can divide itself into millions of tiny equal pieces and sell those pieces to the public. Each piece is called a share of stock.') +
    p('If a company is worth $1,000,000 and it divides itself into 1,000,000 shares, each share is worth $1.00. If you buy 100 shares, you own 0.01% of the company and your shares are worth $100. If the company grows and becomes worth $2,000,000, your 100 shares are now worth $200. That is how stock ownership works at its most basic level.') +
    callout('amber','Real example','Apple Inc. (ticker: AAPL) has approximately 15 billion shares outstanding. When you buy one share of Apple, you own one 15-billionth of the entire Apple company — every iPhone factory, every employee, every dollar in their bank account.') +
    h2('1.2 Why Do Companies Issue Stock?') +
    p('Companies issue stock to raise capital — money they can use to grow the business. This process of selling stock to the public for the first time is called an Initial Public Offering, or IPO. Before the IPO, the company is private. After the IPO, it is public and anyone can buy shares.') +
    twoCol('Private company','Owned by founders, early investors, and employees. Shares cannot be bought by the general public. Examples: your local restaurant, a startup before its IPO.','Public company','Shares are listed on a stock exchange and can be bought and sold by anyone with a brokerage account. Examples: Apple, Tesla, Amazon, GameStop.','blue','green') +
    h2('1.3 What is the Stock Market?') +
    p('The stock market is a network of buyers and sellers who trade shares of public companies. Think of it like an auction — but instead of art or antiques, people are buying and selling pieces of companies. In the United States, the two main stock exchanges are:') +
    ul(['NYSE (New York Stock Exchange) — the oldest and largest exchange by market value. Home to large, established companies like JPMorgan and Exxon.','NASDAQ — technology-heavy exchange. Home to Apple, Microsoft, Tesla, and Amazon.']) +
    p('The U.S. stock market is open Monday through Friday, 9:30 AM to 4:00 PM Eastern Time. There is also a pre-market session (4:00 AM–9:30 AM EST) and after-hours session (4:00 PM–8:00 PM EST). At CREDO, your primary focus will be on the pre-market and the first 90 minutes of the regular session.') +
    h2('1.4 How Does a Stock Price Change?') +
    p('A stock price changes every second during market hours based on supply and demand. If more people want to buy a stock than sell it, the price goes up. If more people want to sell than buy, the price goes down. Every price movement comes down to this simple equation.') +
    p('What causes people to want to buy or sell?') +
    ul(['Company news — earnings reports, new products, lawsuits, management changes','Industry news — regulatory changes, competitor announcements','General market sentiment — fear, greed, economic data','For small-cap stocks specifically: press releases, FDA decisions, contract wins, stock offerings']) +
    callout('green','Key insight','As a day trader you are not investing in companies. You are trading the price movements caused by these events. Whether a company is good or bad is largely irrelevant. What matters is whether the price is moving, why it is moving, and whether you can predict the short-term direction.');

function buildLesson2() {
  return obj('By the end of this lesson you will understand what a brokerage account is, what the bid and ask prices mean, and what the different types of orders do.') +
    h2('2.1 The Brokerage Account') +
    p('To buy and sell stocks you need a brokerage account. A broker is a company that connects you to the stock market. You deposit money into your brokerage account, and the broker allows you to place buy and sell orders on stock exchanges.') +
    p('At CREDO Trading Academy we use Interactive Brokers (IB) as our brokerage. It is one of the most powerful and cost-effective platforms available for active traders. You will open and fund your IB account before beginning hands-on training.') +
    callout('amber','Important — PDT Rule','U.S. regulations require day traders to maintain a minimum account balance of $25,000. This rule is called the Pattern Day Trader (PDT) rule. If your account falls below $25,000 you will be restricted from making more than 3 day trades in a rolling 5-day period. We will cover this in detail in Module 5.') +
    h2('2.2 The Bid and Ask') +
    p('Every stock has two prices at any given moment: the bid and the ask.') +
    dataTable(['Price','Definition','You pay / receive'],[['BID','The highest price a buyer is willing to pay right now','You receive this price when you SELL'],['ASK','The lowest price a seller is willing to accept right now','You pay this price when you BUY'],['SPREAD','The difference between ask and bid','This is the built-in cost of every round-trip trade']]) +
    p('Example: Stock XYZ has a bid of $5.00 and an ask of $5.10. The spread is $0.10. If you buy 1,000 shares at $5.10 and immediately sell at $5.00, you lose $100 before the stock moves even one penny. This is why spread cost is critical.') +
    callout('amber','Small-cap alert','Small-cap stocks often have much wider spreads than large-cap stocks — sometimes $0.20, $0.50, or more. A stock must move substantially in your favor just to break even on entry. We will calculate spread costs as part of every trade plan.') +
    h2('2.3 Types of Orders') +
    h3('Market Order') +
    p('A market order tells the broker to buy or sell immediately at whatever the current price is. It guarantees your order will be filled but does NOT guarantee the price. In a fast-moving small-cap stock, a market order can fill at a price far from what you expected. This is called slippage.') +
    callout('red','Warning','Never use market orders on small-cap stocks during volatile periods. The price you see and the price you get can be dramatically different. At CREDO we use limit orders for all entries and exits.') +
    h3('Limit Order') +
    p('A limit order tells the broker to buy or sell only at a specific price or better. A buy limit order will only fill at your price or lower. A sell limit order will only fill at your price or higher. This protects you from slippage but means your order may not fill if the price does not reach your limit.') +
    callout('green','CREDO standard','All student entries and exits must use limit orders. Bracket orders (entry + stop + target submitted together) are required from Week 3 of training onward.') +
    h3('Stop Order (Stop Loss)') +
    p('A stop order becomes a market order once the stock reaches a specified trigger price. Stop orders are used as stop losses — automatic exits that protect you when a trade goes wrong. When the stock hits your stop price, your shares are sold immediately to cut the loss.') +
    h3('Stop Limit Order') +
    p('A stop limit order combines a stop and a limit. When the trigger price is hit, it becomes a limit order rather than a market order. This prevents slippage on the stop but introduces risk: if the stock drops fast through your limit price, your order may not fill and your loss can grow larger than planned.') +
    dataTable(['Order type','Best for','Risk'],[['Market','Speed — guaranteed fill','Price slippage — never use on small-caps'],['Limit','Controlled entry and exit price','May not fill if price misses your level'],['Stop (market)','Quick stop loss execution','Slippage on fast-moving stocks'],['Stop limit','Price-controlled stop loss','May not fill in fast drops']]);
}

function buildLesson3() {
  return obj('By the end of this lesson you will understand what small-cap stocks are, why they are different from large-cap stocks, and why they are the focus of this Academy.') +
    h2('3.1 What is Market Capitalization?') +
    p('Market capitalization (market cap) is the total value of a company\'s outstanding shares. It is calculated simply: share price multiplied by total number of shares.') +
    dataTable(['Category','Market cap','Examples'],[['Mega-cap','Over $200B','Apple, Microsoft, Google'],['Large-cap','$10B – $200B','Ford, Nike, Starbucks'],['Mid-cap','$2B – $10B','Hasbro, Five Below'],['Small-cap','$300M – $2B','Regional companies, biotech'],['Micro-cap','Under $300M','Early-stage, speculative stocks']]) +
    callout('amber','CREDO note','We use the term "small-cap" loosely to include micro-cap stocks. The stocks we trade typically have share prices between $1 and $20 and market caps under $500 million. This range produces the most predictable intraday price movements.') +
    h2('3.2 What is Float?') +
    p('Float is the number of shares available for public trading — not the total shares outstanding, but specifically the shares that are not locked up by insiders, institutions, or restricted stock agreements.') +
    p('Example: A company has 10,000,000 total shares outstanding. The CEO owns 4,000,000 (locked up). Another 1,000,000 are restricted. The float is 10,000,000 – 4,000,000 – 1,000,000 = 5,000,000 shares.') +
    twoCol('Low float (under 10M shares)','Fewer shares available means each buy or sell order has more impact on price. Stocks move faster and further. Large percentage moves are common — 10%, 50%, 100%+ in one day.','High float (over 50M shares)','More shares available means price is more stable. Large orders have less impact. Moves are smaller and slower. Less opportunity for day traders.','blue','green') +
    callout('green','The CREDO edge','We focus on low-float stocks because they produce the biggest price moves in the shortest time. A stock with 2 million shares in float and a fresh catalyst can move 50–200% in a single morning.') +
    h2('3.3 What Causes Small-Cap Stocks to Move?') +
    p('Small-cap stocks move on catalysts — news events that cause traders to buy or sell rapidly. Learning to identify catalysts is your first core skill as a trader.') +
    h3('Tier 1 Catalysts (strongest movers)') +
    ul(['FDA decisions — drug approval or rejection for biotech companies. Can move a stock 50–300% in minutes.','Earnings surprises — results dramatically better or worse than expected.','Major contract wins — unexpected large government or corporate contracts.','Merger or acquisition announcements — company being bought out, often at a premium.']) +
    h3('Tier 2 Catalysts (moderate movers)') +
    ul(['SEC filings — S-1 (going public), S-3 (new share offering), 8-K (material event disclosure).','Sector sympathy — a stock in the same sector as a big mover often follows.','Short squeeze — heavily shorted stock surges as short sellers scramble to cover.']) +
    h3('Tier 3 Catalysts (weaker movers)') +
    ul(['General market news — Fed announcements, economic data releases.','Technical breakouts — price breaking a key chart level with no news.','Social media attention — Reddit or Twitter driven momentum (often short-lived).']) +
    callout('amber','Important','A strong catalyst does NOT automatically mean a profitable trade. The catalyst tells you WHY a stock is moving. Your job is to identify HOW it is likely to move and WHEN to enter and exit. We will build this skill across Modules 3 through 6.') +

    h3('LULD Halt (Limit Up / Limit Down)') +
    p('An automatic circuit breaker triggered when a stock moves too fast in either direction. When a small-cap stock surges more than a set percentage within five minutes, trading is halted for five minutes to allow the market to stabilize. The stock then resumes trading.') +
    callout('blue','Beginner note','The moment after a halt resumes is one of the highest-volatility moments in day trading. As a beginner, observe halts and resumptions rather than trading them until your mentor clears you to do so.') +
    h3('Regulatory Halt (T1 / T2)') +
    p('A halt imposed by FINRA or the SEC when regulators have concerns about a stock. Regulatory halts can last minutes, hours, or even days. Any open position in a halted stock is frozen — a significant risk.') +
    callout('red','Risk rule','Never hold a position in a stock with an active S-3 filing or a history of regulatory halts overnight. We will identify these flags during pre-market scanning training in Module 4.');

function buildLesson4() {

    p('Stock prices are displayed using candlestick charts. Each candlestick represents price movement during a specific time period. A candlestick has four pieces of information:') +
    dataTable(['Data point','What it means','Where it appears'],[['OPEN','Price at the beginning of the period','Bottom of green body / Top of red body'],['CLOSE','Price at the end of the period','Top of green body / Bottom of red body'],['HIGH','Highest price reached during the period','Top of the upper wick'],['LOW','Lowest price reached during the period','Bottom of the lower wick']]) +
    p('A GREEN candle means the stock closed HIGHER than it opened — buyers were in control. A RED candle means the stock closed LOWER than it opened — sellers were in control. The body is the area between open and close. The wicks show how far the price traveled beyond the body during the period.') +
    h2('4.2 Key Price Levels') +
    p('Certain price levels act as magnets — areas where buying or selling tends to cluster repeatedly. Learning to identify these levels is essential for planning your entries and exits.') +
    defTable([['Support','A price level where buyers have repeatedly stepped in and stopped a decline. Think of it as a floor. The more times a stock bounces from a level, the stronger the support.'],['Resistance','A price level where sellers have repeatedly pushed a stock back down. Think of it as a ceiling. Previous highs often become resistance.'],['VWAP','Volume Weighted Average Price. The average price a stock has traded at throughout the day, weighted by volume. VWAP is the most important intraday level for day traders.'],['Pre-market high','The highest price a stock reached before the 9:30 AM open. This level often acts as key resistance or a breakout trigger at the open.'],['Previous close','Where the stock closed the prior day. The gap between previous close and current pre-market price shows how much the stock moved overnight.']]) +

    p('Volume is the number of shares traded during a period. A price move on high volume is significant and likely to continue. A price move on low volume is weak and likely to reverse.') +
    twoCol('High volume + price rise','Strong buying pressure. Many traders are participating. Move is more likely to continue. This is the type of move we look to enter early.','Low volume + price rise','Weak buying pressure. Few traders participating. Move is likely to fade. These are traps that catch inexperienced traders.','green','blue') +
    p('Relative volume compares today\'s volume to the average volume for that time of day. A stock trading at 5x relative volume means it is trading five times more than normal — a signal that something significant is happening.') +
    callout('green','CREDO scan rule','Our Trade Ideas scanner requires a minimum relative volume of 3x before we consider a stock for the watchlist. Low relative volume stocks are ignored regardless of price movement.');
}

function buildM2L1() {
  return obj('By the end of this lesson you will recognize the most important candlestick patterns, understand what they signal about buyer and seller strength, and identify them on a live chart.') +
    h2('1.1 Why Candlestick Patterns Matter') +
    p('In Module 1 you learned that each candlestick shows the open, high, low, and close for a time period, and that green candles mean buyers won that period while red candles mean sellers won. Candlestick patterns take this one step further — they look at the shape of individual candles and combinations of two or three candles to detect moments when momentum is shifting.') +
    callout('amber','Important','Candlestick patterns have higher reliability when they appear at a significant price level — a known support, resistance, VWAP, or pre-market high. A hammer candle in random space means less than a hammer at a key support level with high volume. Context always matters more than the pattern alone.') +
    h2('1.2 Single Candle Reversal Patterns') +
    h3('The Hammer') +
    p('A hammer has a small body near the top of the candle with a long lower wick (at least 2x the body length). It forms after a downward move and signals that sellers pushed price down hard, but buyers stepped in strongly and pushed price back near the open. The long lower wick is the tell — it shows a significant rejection of lower prices.') +
    defTable([['Body','Small, near the top of the candle — open and close were close together'],['Lower wick','Long (2x+ the body length) — sellers pushed hard down, then buyers fought back'],['Upper wick','Little or none — price did not go much above the open/close'],['Location required','After a downward move — only meaningful as a potential reversal']]) +
    callout('green','Key insight','A green hammer (closes above the open) is stronger than a red hammer. Both are bullish signals at support, but the green version is more convincing — buyers fully won the period.') +
    h3('The Shooting Star') +
    p('The shooting star is the mirror image of the hammer. It has a small body near the bottom with a long upper wick. It forms after an upward move and signals that buyers pushed price up hard, but sellers overwhelmed them and pushed price back down. On a small-cap stock that has run 50% in the morning, a shooting star at the pre-market high is a strong signal that the move is exhausting.') +
    h3('The Doji') +
    p('A doji forms when the open and close are at or nearly the same price, creating a very small body. The wicks can extend in both directions. A doji means indecision — neither buyers nor sellers won the period. After a strong move in either direction, a doji signals that momentum is stalling.') +
    twoCol('Bullish context','Doji after a downward move at support — buyers and sellers are equally matched. Watch for the next candle to confirm direction.','Bearish context','Doji after a strong upward move at resistance — the buying momentum has stalled. If the next candle is red, the reversal is likely confirmed.','green','red') +
    h3('The Marubozu') +
    p('A marubozu is a candle with a large body and little or no wicks. A green marubozu means pure buyer control from open to close. A red marubozu means pure seller control. These signal strong momentum and often appear during the first five minutes of a gap-and-go opening.') +
    h2('1.3 Two-Candle Patterns') +
    h3('The Engulfing Pattern') +
    p('An engulfing pattern requires two candles. The second candle\'s body completely contains (engulfs) the first candle\'s body.') +
    ul(['Bullish engulfing: After a downward move, a small red candle is followed by a large green candle that engulfs it. Buyers dominated so completely on the second candle that they overcame the entire previous period\'s selling.',
        'Bearish engulfing: After an upward move, a small green candle is followed by a large red candle that engulfs it. Sellers took complete control — a frequent signal that a small-cap morning run is ending.']) +
    callout('amber','Small-cap note','Bearish engulfing patterns on the 1-minute chart during the power hour (9:30-10:30 AM) are one of the most reliable short-entry signals for experienced traders. As a beginner, observe these — do not trade them — until Module 3 and 4 training is complete.') +
    defTable([['Hammer','Small body near top, long lower wick. Bullish reversal at support.'],['Shooting star','Small body near bottom, long upper wick. Bearish reversal at resistance.'],['Doji','Open and close nearly equal. Signals indecision and potential reversal.'],['Marubozu','Large body, no wicks. Signals strong pure momentum.'],['Bullish engulfing','Large green candle fully engulfs prior red candle. Bullish reversal.'],['Bearish engulfing','Large red candle fully engulfs prior green candle. Bearish reversal.']]);
}

function buildM2L2() {
  return obj('By the end of this lesson you will be able to draw meaningful support and resistance levels on a chart, explain why they matter, and identify the key levels used in CREDO trading sessions.') +
    h2('2.1 Why Support and Resistance Are the Foundation of All Trading') +
    p('Every setup you will ever trade at CREDO is defined in relation to a key level. Your entry will be near a level. Your stop will be just beyond a level. Your target will be the next level. Without understanding how levels work, you cannot build a trade plan.') +
    p('A support level is a price where buyers have historically stepped in and prevented further decline — a floor. A resistance level is a price where sellers have overwhelmed buyers and prevented further advance — a ceiling.') +
    callout('amber','Key concept','Support and resistance are zones, not exact prices. Draw a zone approximately $0.10 to $0.30 wide on a small-cap stock and think about whether price is respecting that zone, not whether it has touched a single price.') +
    h2('2.2 The Most Important Levels in Small-Cap Trading') +
    h3('Pre-Market High (PMH)') +
    p('The pre-market high is the highest price before the 9:30 AM open. It is the single most watched level in small-cap trading. When a stock gaps up on a catalyst, the pre-market high is where the first real test of strength happens.') +
    twoCol('Gap-and-go scenario','Stock opens, consolidates briefly below PMH, then breaks above it with high volume. This breakout is a classic long entry trigger — buyers who were waiting for confirmation rush in.','Gap-and-trap scenario','Stock opens, spikes briefly above PMH on thin volume, then immediately reverses. This false breakout is a trap. The stock often sells off sharply as trapped longs and new shorts create selling pressure.','green','red') +
    h3('Previous Day\'s Close (PDC)') +
    p('The previous day\'s close is a reference point for overnight context. If a stock gapped up significantly from its PDC, the size of that gap tells you how aggressive the overnight buying was. PDC often acts as support on pullbacks — if a stock has run from $3.50 (PDC) to $5.00 on a catalyst, a pullback to $3.50 may find buyers stepping back in.') +
    h3('Round Numbers') +
    p('Round numbers — $1, $2, $3, $5, $10, $20 — act as natural support and resistance because they are psychologically significant. Traders place orders at round numbers. Stops cluster around them. On a stock moving from $2.50 toward $5.00, the $5.00 level will almost always act as resistance.') +
    h3('Intraday Highs and Lows') +
    p('As the trading day progresses, the high and low of the day become dynamic levels. A breakout above the high of day (HOD) is bullish. A break below the low of day (LOD) is bearish. In CREDO daily sessions, the mentor will call out HOD and LOD during live commentary.') +
    h2('2.3 How to Draw Levels') +
    p('Drawing levels is a skill that improves with practice. Follow these steps for every watchlist stock:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Mark the pre-market high and previous close first — these are mandatory for every watchlist stock.</li>' +
      '<li>Look for price areas with multiple touches. Three bounces from $4.20 in two days = meaningful support.</li>' +
      '<li>Mark round numbers between current price and 2x the PMH as potential resistance zones.</li>' +
      '<li>Do not over-draw. Five clear levels are more useful than fifteen marginal ones.</li>' +
      '<li>Zoom out to the daily chart to see prior week support and resistance — these carry more weight.</li>' +
    '</ol>' +
    callout('green','Daily practice','During observation homework, draw PMH, previous close, and obvious S/R zones on each watchlist stock before 9:30 AM. Watch what happens at each level during the open. Note which levels held and which broke. This is how pattern recognition develops.');
}

function buildM2L3() {
  return obj('By the end of this lesson you will understand how VWAP is calculated, why it is the most important intraday level, and how to use it to evaluate whether a trade setup is strong or weak.') +
    h2('3.1 What VWAP Is and Why It Matters') +
    p('VWAP stands for Volume Weighted Average Price. It is the average price a stock has traded at throughout the day, with each transaction weighted by the number of shares traded. A transaction of 10,000 shares at $5.00 has ten times more influence on VWAP than 1,000 shares at $6.00.') +
    p('VWAP resets to zero at the start of each trading day and recalculates continuously. It appears as a single curved line on an intraday chart. Sterling Trader Pro displays VWAP automatically.') +
    callout('amber','Why VWAP matters','Institutional traders — funds, market makers, algorithms — use VWAP as their execution benchmark. When a fund buys a large block, they try to buy at or below VWAP. This institutional activity makes VWAP a self-fulfilling line of support and resistance. Traders who understand VWAP trade in alignment with institutional order flow.') +
    h2('3.2 Trading Above vs Below VWAP') +
    defTable([['Price above VWAP','Stock is trading above the average price paid today. Buyers have been dominant. Bullish intraday structure — look for long setups.'],['Price below VWAP','Stock is trading below the average price paid today. Sellers have been dominant. Bearish intraday structure — look for short setups.'],['Price at VWAP','Stock is testing the average price. Highest-significance moment. Watch for direction — break above or below tells you who is winning.']]) +
    h2('3.3 The VWAP Reclaim — A Core CREDO Setup') +
    p('The VWAP reclaim is one of the most reliable patterns in small-cap day trading:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Stock gaps up strongly on a catalyst and opens above VWAP.</li>' +
      '<li>Early profit-taking causes the stock to pull back and dip below VWAP.</li>' +
      '<li>Buyers who missed the initial move see this as an opportunity and step in near VWAP.</li>' +
      '<li>The stock reclaims VWAP — crosses back above the line with volume.</li>' +
      '<li>The reclaim is the entry trigger. Stop goes just below VWAP. Target is the pre-market high or high of day.</li>' +
    '</ol>' +
    callout('green','Key insight','The VWAP reclaim only works when the underlying catalyst is still valid. If the stock dipped below VWAP because bad news emerged or the market sold off, a reclaim has less significance. Always combine VWAP with catalyst awareness.') +
    h2('3.4 VWAP as a Stop Reference') +
    p('VWAP is used as a stop reference for many CREDO setups. When you are long a stock above VWAP, your stop is often just below VWAP. The logic: if the stock loses VWAP, the intraday structure has shifted from bullish to bearish. Your thesis is no longer valid and you exit.') +
    callout('red','Beginner trap','Do not place your stop exactly at VWAP. On a volatile small-cap, price will cross VWAP many times, triggering your stop and then reversing. Place your stop a defined distance below VWAP — typically $0.10 to $0.20 — and look for a candle close below VWAP as confirmation.');
}

function buildM2L4() {
  return obj('By the end of this lesson you will understand what each timeframe shows you, when to use each one, and how to combine them to build a complete picture of a stock\'s price action.') +
    h2('4.1 Why Timeframe Matters') +
    p('A candlestick chart is not a fixed view — it changes completely depending on the timeframe you choose. A 1-minute chart shows one candle for every minute of trading. A 5-minute chart shows one candle for every five minutes. The same stock at the same moment looks very different on each timeframe.') +
    twoCol('1-minute chart','High resolution. Shows every twist and turn. Used for precise entry and exit timing. Can appear chaotic and noisy on volatile stocks. The tree view.','5-minute chart','Medium resolution. Smooths out noise. Shows broader structure — is this a genuine uptrend or just chop? Used for setup identification and trend confirmation. The forest view.','blue','green') +
    h2('4.2 How CREDO Uses Each Timeframe') +
    h3('5-Minute Chart: The Setup Chart') +
    p('The 5-minute chart is where you assess the overall structure of a move. Before entering any trade, look at the 5-minute chart and ask: Is this stock making higher highs and higher lows? Is it above VWAP? Has it consolidated near a key level, suggesting it is building energy for a move? A clean consolidation on the 5-minute chart is one of the strongest setup signals.') +
    h3('1-Minute Chart: The Entry Chart') +
    p('Once you identify a setup on the 5-minute chart, switch to the 1-minute chart to time your entry. Look for the trigger candle — the specific candle that breaks above a level, reclaims VWAP, or shows a reversal pattern at support. Enter when that candle confirms.') +
    callout('amber','Important','New traders who use only the 1-minute chart get whipsawed — they enter on every small spike and get stopped out repeatedly. The 5-minute chart prevents this by ensuring you only take entries where the broader structure supports your direction.') +
    h2('4.3 The Multi-Timeframe Checklist') +
    p('Before every trade, run through this mental check:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>5-minute structure: Is the broader trend in my direction? (Higher highs for a long, lower lows for a short)</li>' +
      '<li>5-minute VWAP: Is the stock on the right side of VWAP for my direction?</li>' +
      '<li>1-minute setup: Is there a specific candlestick pattern or breakout level that defines my entry?</li>' +
      '<li>1-minute entry: What is the specific trigger? What price do I enter at?</li>' +
      '<li>Stop and target: Where is my stop? What is the nearest resistance as my target?</li>' +
    '</ol>' +
    callout('green','CREDO standard','Every trade must be verifiable on both timeframes. If you cannot articulate the 5-minute structure and the 1-minute entry trigger, you do not have a valid setup. You have a guess.') +
    h2('4.4 Reading the First 5 Minutes') +
    p('The first five minutes after 9:30 AM are the most important and most dangerous of the day. Here is how to approach them:') +
    ul(['Do not enter immediately at 9:30. Watch the first one to three candles form — the market is price-discovering in those first minutes.',
        'Observe whether the stock holds above its pre-market high (gap-and-go) or immediately reverses (gap-and-trap).',
        'Watch where the first 5-minute candle closes. Upper third is bullish. Lower third is bearish.',
        'Volume in the first 5-minute candle sets the benchmark. Declining volume on subsequent candles means the initial move is losing momentum.']) +
    callout('amber','Beginner guideline','During your first two weeks of observation homework, do not focus on entries at all in the first 5 minutes. Simply watch and narrate what you see in your journal. The ability to read the open comes from pattern exposure — that takes days and weeks of repetition.');
}

function buildM2L5() {
  return obj('By the end of this lesson you will be able to build a complete level map for any watchlist stock before the open, calculate gap percentage, and understand why context determines whether a level is significant.') +
    h2('5.1 Building Your Level Map Before 9:30') +
    p('Professional day traders do not wait for the market to open and then figure out where the important levels are. They build their level map in the 30 to 60 minutes before the open, so that when price reaches a level at 9:32 AM they already know exactly what they will do there.') +
    defTable([['Pre-market high (PMH)','Highest price in pre-market (4 AM-9:30 AM). First major resistance for a gapper. Breakout above = go signal.'],['Pre-market low (PML)','Lowest price in pre-market. Support for gap pullbacks. Break below = weakness signal.'],['Previous close (PDC)','Prior day\'s closing price. Baseline. Gap size = (PMH minus PDC) divided by PDC.'],['Round numbers in range','Identify $1, $2, $3 increments between current price and 2x PMH.'],['Prior day high/low','Yesterday\'s high and low. Longer-term S/R that intraday traders watch.']]) +
    h2('5.2 Calculating Gap Percentage') +
    p('Gap percentage formula: (Pre-market price minus previous close) divided by previous close, multiplied by 100.') +
    p('Example: Stock closed at $3.00. Pre-market price is $4.20. Gap % = (4.20 - 3.00) / 3.00 x 100 = 40%.') +
    defTable([['5-10%','Below CREDO minimum. Often fades at open. Weak catalyst or thin interest.'],['10-25%','Minimum for watchlist. Needs strong catalyst and low float.'],['25-50%','High priority. Strong interest. Likely volatile and tradeable.'],['50%+','Highest priority. Major catalyst. Most opportunity and most risk.']]) +
    callout('amber','Scanner reminder','Our Trade Ideas gap scanner is set to show only stocks with 10%+ gap, float under 20 million, and a confirmed news catalyst. This filter removes the vast majority of gappers and leaves only those worth building a thesis on.') +
    h2('5.3 Why Context Determines Level Significance') +
    p('Not all levels are equal. A level\'s significance is determined by: how many times price has tested it (more touches = stronger), how recent the tests were (recent levels are fresher), and what volume accompanied the tests (high-volume tests leave stronger levels).') +
    p('A stock that bounced from $4.00 three times in the past two days on high volume is far more significant than a level price briefly touched once two weeks ago on thin volume. Prioritize multi-touch, high-volume, recent levels.') +
    callout('green','Practical rule','If you have to squint to see whether the chart is really touching a level, it probably is not meaningful. The most significant levels will be visually obvious — price will have clearly stalled, bounced, or reversed there multiple times.');
}

function buildM2L6() {
  return obj('By the end of this lesson you will be able to assess whether a potential trade setup is high-probability or low-probability based on the factors covered in this module.') +
    h2('6.1 What Makes a Setup Strong') +
    p('A strong setup is one where multiple factors align in your favor. No single factor guarantees a winning trade, but when four or five factors line up the probability of success increases meaningfully. Strong setups are rare — and that rarity is exactly why we wait for them.') +
    defTable([['Tier 1 catalyst','The stock is moving on a specific, verified news event. Tier 1 catalysts (FDA decision, earnings surprise, major contract) produce the most sustained moves.'],['Low float','Under 10 million shares preferred. Each buying order has more price impact.'],['Clear level','The setup is at a well-defined, multi-touch level — not in random space. PMH, a round number, or a VWAP reclaim.'],['Volume confirmation','3x+ relative volume on the move. Volume is the fuel. A breakout on low volume is a trap.'],['Clean chart structure','Higher highs and higher lows for a long. Lower lows for a short. Erratic charts are harder to trade.'],['Right side of VWAP','Above VWAP for a long, below VWAP for a short. Aligns with institutional order flow.']]) +
    h2('6.2 What Makes a Setup Weak') +
    p('Weak setups are those where the supporting factors are absent, contradictory, or unclear. Trading weak setups is where most beginner losses come from.') +
    ul(['No clear catalyst: The stock is moving on volume but there is no specific news. These stocks can reverse violently.',
        'Extended price action: The stock has already moved 50-100%+ from its base. Late entries here are chasing.',
        'Breaking below key levels: The stock keeps making lower lows on increasing volume. A long setup here is fighting the tape.',
        'Low or declining volume: Price is moving but volume is thin and declining. The move is unlikely to continue.',
        'Choppy price action: Large wicks in both directions, price crossing VWAP repeatedly, no clear structure. Sit out.']) +
    callout('red','Risk warning','The most dangerous setups for beginners are those that look strong but are actually weak. A stock making new highs with no apparent reason to pause can feel like an unstoppable winner — right up until it reverses 30% in three minutes. Always verify the catalyst and always have a stop placed before entering.') +
    h2('6.3 The Setup Scorecard') +
    p('Before entering any paper trade, run through this six-point scorecard. Give yourself one point for each factor that clearly supports your direction. Enter only when you score 4 or higher.') +
    dataTable(['Factor','Long trade check','Short trade check'],[['Catalyst','Tier 1 or 2 confirmed','S-3 filing, no catalyst, or fading'],['Float','Under 10M shares','Any float (be careful with shorts)'],['Level','Clear support, PMH breakout, or VWAP reclaim','Clear resistance or break below support'],['Volume','3x+ relative volume on the move','Low or declining volume'],['Structure','Higher highs/lows on 5-min','Lower highs/lows on 5-min'],['VWAP','Trading above VWAP','Trading below VWAP']]) +
    callout('green','Mentor note','In the first months of training, you will find that many scanner stocks fail this scorecard. That is the point. The scorecard trains you to be selective. Five well-qualified setups per week executed correctly teaches more than 20 daily trades on marginal setups.');

function buildM3L1() {
  return obj('By the end of this lesson you will understand exactly how short selling works, what locate costs are, why short selling is riskier than buying, and why it matters even to traders who never short a stock.') +
    h2('1.1 What is Short Selling?') +
    p('When you buy a stock, you profit when the price goes up. Short selling is the opposite — you profit when the price goes down. Here is how it works step by step:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>You tell your broker you want to short 1,000 shares of XYZ at $10.00.</li>' +
      '<li>Your broker borrows 1,000 shares from another client and immediately sells them for $10,000.</li>' +
      '<li>You now owe 1,000 shares. You must eventually return them to the lender.</li>' +
      '<li>If the stock drops to $7.00, you buy 1,000 shares for $7,000 and return them. Profit: $3,000 minus fees.</li>' +
      '<li>If the stock rises to $14.00, you must buy 1,000 shares for $14,000. Loss: $4,000 plus fees.</li>' +
    '</ol>' +
    callout('amber','Key difference','When you buy a stock, your maximum loss is what you paid — the stock can only go to zero. When you short a stock, there is no ceiling. A stock can rise 500% and your loss is 500%. This is why short selling requires extreme risk management.') +
    h2('1.2 Locate Costs and Borrow Fees') +
    p('Before you can short a stock, your broker must locate shares to borrow. High-demand stocks may have very high borrow fees or be completely unavailable.') +
    defTable([
      ['Easy to borrow (ETB)','Shares readily available. Borrow fee minimal — 0.25-1% annually. Most large-cap stocks.'],
      ['Hard to borrow (HTB)','Shares scarce. Borrow fee can be 50%, 100%, 200%+ annually — charged daily.'],
      ['No locate','No shares available at all. Cannot short regardless of desire.'],
      ['Locate cost','Daily fee for borrowing. Formula: (shares × price × annual rate) / 365.'],
      ['Buy-in risk','Broker can force you to close your short at any time if the lender recalls shares.'],
    ]) +
    p('Example: You short 500 shares of a $5 stock at a 200% annual borrow rate. Daily cost = (500 × $5 × 2.00) / 365 = $13.70 per day. Three days = $41.10 in borrow fees before commissions.') +
    h2('1.3 Why Short Selling Matters Even If You Never Short') +
    p('Most CREDO students focus on long trades during the Foundation Course. But understanding short selling is essential because:') +
    ul(['Short sellers create selling pressure you need to predict and trade around.','A heavily shorted stock is fuel for a short squeeze — one of the most powerful setups.','SEC filings reveal short interest, which tells you whether a squeeze is possible.','Understanding when short sellers are trapped helps you identify continuation moves after a breakout.']) +
    callout('green','Key insight','The best long trades on small-cap stocks often occur when short sellers are wrong. A stock with 30% of its float sold short, a strong catalyst, and rising volume is a potential short squeeze. Knowing why short sellers panic-buy to cover is what makes this setup so powerful.') +
    h2('1.4 The Short Interest Ratio') +
    p('Short interest ratio (days to cover) = short interest divided by average daily volume. It tells you how many days it would take for all short sellers to buy back at normal volume.') +
    dataTable(['Short interest ratio','Interpretation','Squeeze potential'],[['1-2 days','Light short interest','Low'],['3-5 days','Moderate short interest','Medium'],['6-10 days','Heavy short interest','High'],['10+ days','Extreme short interest','Very high']]) +
    callout('red','Risk warning','High short interest does not guarantee a squeeze. A stock can be heavily shorted and keep falling for months if the catalyst is weak. Short interest is the fuel — the catalyst is the match.');
}

function buildM3L2() {
  return obj('By the end of this lesson you will understand what causes a short squeeze, how to identify one pre-market, and what the price action looks like during and after a squeeze.') +
    h2('2.1 What is a Short Squeeze?') +
    p('A short squeeze occurs when a heavily shorted stock rises rapidly, forcing short sellers to buy back their shares to limit losses. Because short sellers must buy — they have no choice once their loss threshold is hit — this forced buying adds fuel to the upward move, causing even faster rises, forcing more shorts to cover. It becomes self-reinforcing.') +
    p('Short squeezes on small-cap stocks can rise 100%, 200%, or 500% in a single morning. This is why they are both the most profitable setups and the most dangerous ones.') +
    h2('2.2 The Anatomy of a Short Squeeze') +
    dataTable(['Stage','What happens','What to watch for'],[['1. Setup','High short interest. Shorts are complacent.','Check short interest on Finviz before 7 AM.'],['2. Catalyst','Unexpected positive news hits pre-market.','Scan for news on Trade Ideas.'],['3. Gap up','Stock gaps up. Early short sellers underwater.','Gap % on scanner — look for 30%+ gaps on HTB stocks.'],['4. Panic covering','Shorts buy back to limit losses. Volume surges.','Pre-market volume spike — 3x+ normal.'],['5. Breakout','Stock breaks above PMH as covering accelerates.','Watch PMH level on 1-minute chart at open.'],['6. Continuation','New long buyers pile in. Price extends.','Clean higher highs with no red candles.'],['7. Exhaustion','Shorts fully covered. Longs take profits.','Shooting star or bearish engulfing at extension.']]) +
    h2('2.3 Pre-Market Squeeze Checklist') +
    p('Before the 9:30 AM open, run through all six:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Short interest above 20% of float — verify on Finviz (Short Float %).</li>' +
      '<li>Stock is hard to borrow — if locate availability is limited, shorts are trapped.</li>' +
      '<li>Gap of 20%+ — the overnight move must already hurt short sellers.</li>' +
      '<li>Confirmed Tier 1 or 2 catalyst — not just volume.</li>' +
      '<li>Pre-market volume at least 3x normal.</li>' +
      '<li>Stock holding above pre-market high — if it cannot hold gains, squeeze may already be fading.</li>' +
    '</ol>' +
    callout('green','CREDO rule','A confirmed short squeeze setup requires all six checklist items. Missing any one — especially the catalyst — means you are chasing a move, not trading a setup.') +
    h2('2.4 Trading the Squeeze vs Watching the Squeeze') +
    p('As a beginner in the Foundation Course, your role during a short squeeze is to observe and document, not to trade. Entry timing is extremely difficult — the stock can move $2-3 in seconds. Exits are equally chaotic. The spread on a squeezing small-cap can widen to $0.50 or more.') +
    callout('amber','Beginner instruction','During Phase 1 paper trading, observe and journal every short squeeze you see. Write down: the catalyst, the short interest, the gap %, the highest price, and what the reversal looked like. After 30+ observations you will have the pattern recognition to time these setups.');
}

function buildM3L3() {
  return obj('By the end of this lesson you will be able to open any SEC filing for a small-cap stock, identify whether it is an S-1, S-3, or 8-K, and extract the information relevant to your trading decision in under 60 seconds.') +
    h2('3.1 Why SEC Filings Matter to Day Traders') +
    p('Most day traders ignore SEC filings. This is a mistake. For small-cap stocks, SEC filings are often the source of both the catalyst that creates a trading opportunity and the risk that destroys it. A stock can gap up 50% on an 8-K announcing a new contract and fall 80% on an S-3 announcing a dilutive stock offering. Knowing the difference takes two minutes and can save your account.') +
    p('All SEC filings are public and free at sec.gov. You can also find them linked on Finviz and in the Trade Ideas news feed.') +
    h2('3.2 The Three Filings You Must Know') +
    h3('The 8-K — Current Report') +
    p('An 8-K is filed whenever a company experiences a material event significant enough to affect the stock price. Must be filed within four business days. For small-cap trading, 8-Ks are the most common source of catalysts.') +
    dataTable(['8-K event type','What it means','Trading implication'],[['Entry into a material agreement','New contract, partnership, or deal.','Bullish — check deal size vs market cap.'],['Results of operations','Earnings report or revenue update.','Bullish if beat, bearish if miss.'],['FDA or regulatory decision','Drug approval, rejection, or trial result.','Tier 1 catalyst — largest moves.'],['Changes in executive leadership','New CEO, CFO, or board.','Usually neutral unless major hire.'],['Amendment to articles','Changes to structure or share count.','Watch for share count increase.'],['Bankruptcy or insolvency','Company financial distress.','Immediate bearish — avoid.']]) +
    h3('The S-3 — Shelf Registration') +
    p('An S-3 gives the company permission to sell additional shares at any time. When a small-cap files an S-3, it is announcing its intention to dilute shareholders. This is one of the most bearish signals a small-cap can show.') +
    callout('red','Critical risk rule','Never hold a long position in a small-cap stock with an active S-3 filing and registered shares not yet sold. The company can sell those shares while you are long — causing an immediate and severe price drop. Check for S-3 filings on every watchlist stock before the open.') +
    h3('The S-1 — IPO Registration') +
    p('An S-1 is filed when a company first registers to go public. For day traders, the S-1 contains detailed float, insider ownership, and lock-up expiry information not available anywhere else. Newly public small-caps often have volatile trading when early investor lock-ups expire.') +
    h2('3.3 How to Read a Filing in 60 Seconds') +
    p('You do not read SEC filings word for word. You scan for specific numbers and keywords:') +
    '<ol class="lesson-ul" style="list-style:decimal;">' +
      '<li>Open the filing on sec.gov or click the Finviz link.</li>' +
      '<li>Press Ctrl+F and search for: "shares", "offering", "dilut", "warrant", "convert".</li>' +
      '<li>If you find an offering — e.g. "up to 5,000,000 shares" — compare to the float. Over 20% of float = major dilution risk.</li>' +
      '<li>Search for the dollar amount of any deal. Compare to market cap. A $10M contract for a $50M company is significant.</li>' +
      '<li>Check the date filed. Today or yesterday = active catalyst. Six months ago = old news.</li>' +
    '</ol>' +
    callout('green','Shortcut','On Trade Ideas, click the news headline directly. Most scanners link to the SEC filing or press release. You rarely need to go to sec.gov manually — but you must know how when the link is not available.');
}
