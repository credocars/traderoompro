<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060810; --panel:#0c0f1a; --card:#111827; --card2:#0e1420;
  --border:#1e2d45; --border-hi:#2a3f5f;
  --green:#00d97e; --blue:#3b82f6; --cyan:#06b6d4;
  --red:#ff3b5c; --orange:#f59e0b; --purple:#8b5cf6;
  --t1:#f0f2f8; --t2:#8b95a8; --t3:#4a5568;
  --radius:10px; --radius-sm:7px; --radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:"JetBrains Mono",monospace;background:var(--bg);color:var(--t1);height:100vh;display:flex;overflow:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(6,8,16,.88);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--panel);border:1px solid var(--border-hi);border-radius:16px;padding:36px;width:420px;display:flex;flex-direction:column;gap:16px;box-shadow:0 40px 80px rgba(0,0,0,.7);position:relative;overflow:hidden;}
.modal-box::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.5),rgba(0,217,126,.5),transparent);}
.modal-logo{display:flex;align-items:center;gap:12px;}
.modal-logo-mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#0f2040,#1a3a6b);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;}
.modal-logo-mark svg{width:24px;height:24px;}
.modal-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.modal-sub{font-size:10px;color:var(--t3);margin-top:2px;}
.modal-divider{height:1px;background:var(--border);}
.tab-row{display:flex;border:1px solid var(--border-hi);border-radius:8px;overflow:hidden;}
.auth-tab{flex:1;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;padding:9px;border:none;background:var(--card);color:var(--t3);cursor:pointer;transition:all .15s;}
.auth-tab.active{background:var(--blue);color:#fff;}
.modal-input-group{display:flex;flex-direction:column;gap:10px;}
.modal-input{font-family:"JetBrains Mono",monospace;font-size:12px;background:var(--card);border:1px solid var(--border-hi);color:var(--t1);padding:11px 14px;border-radius:7px;outline:none;transition:border-color .15s;width:100%;}
.modal-input:focus{border-color:var(--blue);}
.modal-input::placeholder{color:var(--t3);}
.modal-role-row{display:flex;gap:8px;}
.role-btn{flex:1;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;padding:9px;border-radius:6px;border:1px solid var(--border-hi);background:var(--card);color:var(--t3);cursor:pointer;transition:all .15s;text-align:center;}
.role-btn.active{border-color:var(--blue);background:rgba(59,130,246,.12);color:var(--blue);}
.role-btn.pro.active{border-color:var(--cyan);background:rgba(6,182,212,.1);color:var(--cyan);}
.modal-join-btn{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;padding:13px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--green),var(--cyan));color:#000;cursor:pointer;transition:opacity .15s;letter-spacing:.04em;}
.modal-join-btn:hover{opacity:.88;}
.modal-join-btn:disabled{opacity:.5;cursor:not-allowed;}
.modal-error{font-size:9px;color:var(--red);padding:7px 10px;background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.2);border-radius:5px;display:none;}
.forgot-link{text-align:right;margin-top:-4px;}
.forgot-link span{font-size:9px;color:var(--blue);cursor:pointer;}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:100vh;position:relative;z-index:10;}
.sb-logo-area{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-wordmark{font-family:"Syne",sans-serif;font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.3px;}
.sb-wordmark span{color:var(--blue);}
.sb-live-chip{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--red);margin-top:7px;text-transform:uppercase;}
.sb-live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px rgba(255,59,92,.6);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 0 20px;}
.sb-scroll::-webkit-scrollbar{width:0;}
.sb-section{padding:14px 16px 4px;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;margin:1px 6px;cursor:pointer;font-size:11px;font-weight:600;color:var(--t3);transition:all .12s;}
.sb-item:hover{background:rgba(59,130,246,.07);color:var(--t2);}
.sb-item.active{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.15);}
.sb-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.sb-divider{height:1px;background:var(--border);margin:6px 14px;}
.sb-badge-live{font-size:8px;font-weight:700;background:rgba(255,59,92,.12);color:var(--red);border:1px solid rgba(255,59,92,.2);padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.06em;animation:pulse 2s ease-in-out infinite;}
.sb-bottom{padding:12px 8px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:rgba(6,182,212,.15);color:var(--cyan);}
.sb-uname{font-size:11px;font-weight:700;color:var(--t1);}
.sb-urole{font-size:9px;color:var(--t3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative;z-index:1;}
.header{height:52px;background:rgba(6,8,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.h-title{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px;}
.h-badge{font-size:9px;font-weight:700;background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2);padding:3px 9px;border-radius:6px;letter-spacing:.08em;text-transform:uppercase;}
.h-date{font-size:11px;color:var(--t2);margin-left:auto;}
.h-datepick{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border-hi);background:var(--card);color:var(--t1);cursor:pointer;outline:none;}
.h-datepick:focus{border-color:var(--blue);}
.h-refresh{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;padding:5px 14px;border-radius:7px;border:1px solid var(--border-hi);background:var(--card);color:var(--t2);cursor:pointer;transition:all .12s;}
.h-refresh:hover{border-color:var(--cyan);color:var(--cyan);}

.content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}

/* SETUP CARD */
.setup-card{background:var(--panel);border:1px solid var(--border-hi);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;}
.setup-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(6,182,212,.4),rgba(0,217,126,.4),transparent);}
.setup-title{font-family:"Syne",sans-serif;font-size:14px;font-weight:800;color:var(--cyan);display:flex;align-items:center;gap:8px;letter-spacing:-.2px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.setup-field label{font-size:9px;font-weight:700;color:var(--t3);display:block;margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase;}
.setup-field input{width:100%;font-family:"JetBrains Mono",monospace;font-size:11px;padding:9px 12px;border-radius:7px;border:1px solid var(--border-hi);outline:none;transition:border-color .15s;background:var(--card);color:var(--t1);}
.setup-field input:focus{border-color:var(--cyan);}
.setup-field input::placeholder{color:var(--t3);}
.setup-actions{display:flex;gap:10px;align-items:center;}
.btn-save{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;padding:9px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--green),var(--cyan));color:#000;cursor:pointer;transition:opacity .15s;letter-spacing:.03em;}
.btn-save:hover{opacity:.88;}
.btn-secondary{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;padding:9px 16px;border-radius:8px;border:1px solid var(--border-hi);background:transparent;color:var(--t2);cursor:pointer;transition:all .12s;}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
.setup-note{font-size:9px;color:var(--t3);line-height:1.8;}
.setup-note code{color:var(--cyan);background:rgba(6,182,212,.08);padding:1px 5px;border-radius:4px;}
.setup-status{font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;}
.setup-status.ok{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.setup-status.err{background:rgba(255,59,92,.1);color:var(--red);border:1px solid rgba(255,59,92,.2);}

/* SUMMARY STATS */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border-hi),transparent);}
.stat-label{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.blue{color:var(--blue);}
.stat-val.cyan{color:var(--cyan);}
.stat-sub{font-size:9px;color:var(--t3);margin-top:3px;}

/* TABLE */
.table-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;position:relative;}
.table-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3),rgba(0,217,126,.3),transparent);}
.table-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.table-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:800;color:var(--t1);}
.table-count{font-size:9px;font-weight:700;background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);padding:2px 8px;border-radius:5px;letter-spacing:.04em;}
.tv-table{width:100%;border-collapse:collapse;}
.tv-table th{font-size:9px;font-weight:700;color:var(--t3);padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);text-transform:uppercase;letter-spacing:.08em;}
.tv-table td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;vertical-align:middle;}
.tv-table tr.student-row{cursor:pointer;transition:background .12s;}
.tv-table tr.student-row:hover{background:rgba(59,130,246,.04);}
.tv-table tr.detail-row td{padding:0;background:rgba(6,182,212,.02);}
.student-name{font-family:"Syne",sans-serif;font-weight:700;color:var(--t1);font-size:12px;}
.student-email{font-size:9px;color:var(--t3);margin-top:2px;}
.pl-pos{color:var(--green);font-weight:700;}
.pl-neg{color:var(--red);font-weight:700;}
.pl-zero{color:var(--t2);}
.win-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700;}
.win-high{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.win-mid{background:rgba(245,158,11,.1);color:var(--orange);border:1px solid rgba(245,158,11,.2);}
.win-low{background:rgba(255,59,92,.1);color:var(--red);border:1px solid rgba(255,59,92,.2);}
.expand-btn{font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--border-hi);background:transparent;color:var(--t3);cursor:pointer;transition:all .12s;}
.expand-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.trade-row-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;}
.badge-L{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.badge-S{background:rgba(255,59,92,.1);color:var(--red);border:1px solid rgba(255,59,92,.2);}

/* DETAIL */
.detail-inner{padding:12px 18px 16px;}
.detail-title{font-size:9px;font-weight:700;color:var(--cyan);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em;}
.trades-mini{width:100%;border-collapse:collapse;background:var(--card2);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.trades-mini th{font-size:9px;font-weight:700;color:var(--t3);padding:7px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);text-align:left;text-transform:uppercase;letter-spacing:.06em;}
.trades-mini td{font-size:11px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);}
.trades-mini tr:last-child td{border-bottom:none;}
.no-trades{text-align:center;color:var(--t3);font-size:11px;padding:24px;}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px;gap:12px;color:var(--t2);}
.spinner{width:28px;height:28px;border:2px solid rgba(6,182,212,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:64px;color:var(--t3);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.5;}
.empty-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;color:var(--t2);margin-bottom:6px;}
.empty-sub{font-size:10px;color:var(--t3);}
</style>
</head>
<body>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <div class="modal-logo">
      <div class="modal-logo-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#00d97e" stroke-width="2" stroke-linecap="round"/><circle cx="19" cy="18" r="3" fill="#00d97e"/></svg>
      </div>
      <div>
        <div class="modal-title">TradeRoom PRO</div>
        <div class="modal-sub" id="modalSubtitle">Sign in to join the live session</div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="tab-row">
      <button id="tabLogin" class="auth-tab active" onclick="showTab('login')">Sign In</button>
      <button id="tabRegister" class="auth-tab" onclick="showTab('register')">Create Account</button>
    </div>
    <div id="formLogin" class="modal-input-group">
      <input class="modal-input" id="loginEmail" type="email" placeholder="Email address" autocomplete="email"/>
      <input class="modal-input" id="loginPassword" type="password" placeholder="Password" autocomplete="current-password"/>
      <div class="forgot-link"><span onclick="forgotPassword()">Forgot password?</span></div>
    </div>
    <div id="formRegister" class="modal-input-group" style="display:none;">
      <input class="modal-input" id="regName" type="text" placeholder="Display name" maxlength="24" autocomplete="name"/>
      <input class="modal-input" id="regEmail" type="email" placeholder="Email address" autocomplete="email"/>
      <input class="modal-input" id="regPassword" type="password" placeholder="Password (min 6 chars)" autocomplete="new-password"/>
      <div class="modal-role-row">
        <button class="role-btn active" id="roleStudent" onclick="setRole('student')">🎓 Student</button>
        <button class="role-btn pro" id="roleInstructor" onclick="setRole('instructor')">⭐ Instructor</button>
      </div>
    </div>
    <div class="modal-error" id="formError"></div>
    <button class="modal-join-btn" id="authBtn" onclick="handleAuth()">▶ Enter Trading Room</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo-area">
    <div class="sb-wordmark">TradeRoom<span> PRO</span></div>
    <div class="sb-live-chip"><span class="sb-live-dot"></span>Live Now</div>
  </div>
  <div class="sb-scroll">
    <div class="sb-section">Rooms</div>
    <div class="sb-item" onclick="window.location.href='trading-dashboard.html'">
      <div class="sb-icon" style="background:rgba(255,59,92,.1);">📡</div>
      <span>Pro Mentor</span>
      <span class="sb-badge-live" style="margin-left:auto;">Live</span>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">Tools</div>
    <div class="sb-item" onclick="window.location.href='trading-dashboard.html'"><div class="sb-icon" style="background:rgba(59,130,246,.1);">⌂</div><span>Dashboard</span></div>
    <div class="sb-item" onclick="window.location.href='scanners.html'"><div class="sb-icon" style="background:rgba(0,217,126,.1);">🔍</div><span>Scanners</span></div>
    <div class="sb-item" onclick="window.location.href='chart.html'"><div class="sb-icon" style="background:rgba(139,92,246,.1);">📊</div><span>Charting</span></div>
    <div class="sb-item" onclick="window.location.href='youtube.html'"><div class="sb-icon" style="background:rgba(255,59,92,.1);">▶</div><span>YouTube</span></div>
    <div class="sb-item" onclick="window.location.href='zoom.html'"><div class="sb-icon" style="background:rgba(59,130,246,.1);">🎥</div><span>Zoom</span></div>
    <div class="sb-item" onclick="window.location.href='courses.html'"><div class="sb-icon" style="background:rgba(245,158,11,.1);">🎓</div><span>Courses</span></div>
    <div class="sb-item" onclick="window.location.href='mentorship.html'"><div class="sb-icon" style="background:rgba(0,217,126,.1);">🤝</div><span>Mentorship</span></div>
    <div class="sb-item active"><div class="sb-icon" style="background:rgba(6,182,212,.1);">📈</div><span>Tradervue</span></div>
  </div>
  <div class="sb-bottom">
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">?</div>
      <div><div class="sb-uname" id="sbName">—</div><div class="sb-urole" id="sbRole">—</div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">
    <div class="h-title">Tradervue</div>
    <div class="h-badge">📈 Performance</div>
    <div class="h-date" id="headerDate"></div>
    <input type="date" class="h-datepick" id="datePicker" onchange="loadData()"/>
    <button class="h-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
  <div class="content" id="mainContent">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div style="font-size:11px;">Connecting…</div>
    </div>
  </div>
</div>

<script>
const auth = firebase.auth(), db = firebase.database();
let currentUser = null;
const TV_PROXY = '/.netlify/functions/tradervue';
const TV_CONFIG_PATH = 'traderoom/tvConfig';
let tvConfig = null;
let expandedUsers = new Set();

/* ── AUTH ── */
function showTab(t) {
  const isLogin = t === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
  document.getElementById('formRegister').style.display = isLogin ? 'none' : 'block';
  document.getElementById('authBtn').textContent = isLogin ? 'Sign In' : 'Create Account';
  document.getElementById('formError').style.display = 'none';
}
function handleAuth() {
  const err = document.getElementById('formError'); err.style.display = 'none';
  const btn = document.getElementById('authBtn'); btn.textContent = '…'; btn.disabled = true;
  const isLogin = document.getElementById('tabLogin').classList.contains('active');
  if (isLogin) {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (!email || !pass) { showErr('Please enter email and password.'); return; }
    auth.signInWithEmailAndPassword(email, pass).catch(e => showErr(friendlyErr(e.code)));
  } else {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if (!name || !email || !pass) { showErr('Please fill all fields.'); return; }
    auth.createUserWithEmailAndPassword(email, pass)
      .then(c => db.ref('traderoom/users/' + c.user.uid).set({ name, role: 'student', email }))
      .catch(e => showErr(friendlyErr(e.code)));
  }
}
function showErr(msg) {
  const e = document.getElementById('formError'); e.textContent = '⚠ ' + msg; e.style.display = 'block';
  const btn = document.getElementById('authBtn'); btn.disabled = false;
  btn.textContent = document.getElementById('tabLogin').classList.contains('active') ? 'Sign In' : 'Create Account';
}
function friendlyErr(code) {
  const m = { 'auth/user-not-found': 'No account found.', 'auth/wrong-password': 'Incorrect password.', 'auth/invalid-credential': 'Incorrect email or password.', 'auth/email-already-in-use': 'Already registered.', 'auth/weak-password': 'Password too short.' };
  return m[code] || 'Something went wrong.';
}
function forgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showErr('Enter your email first.'); return; }
  auth.sendPasswordResetEmail(email).then(() => {
    const e = document.getElementById('formError'); e.textContent = '✅ Reset email sent!'; e.style.color = '#34c759'; e.style.display = 'block';
  }).catch(e => showErr(friendlyErr(e.code)));
}

auth.onAuthStateChanged(async u => {
  if (!u) return;
  const snap = await db.ref('traderoom/users/' + u.uid).get();
  const p = snap.exists() ? snap.val() : null;
  const name = p?.name || u.email.split('@')[0];
  const role = p?.role || 'student';
  currentUser = { name, role, uid: u.uid, email: u.email };
  document.getElementById('loginModal').classList.add('hidden');
  document.getElementById('sbName').textContent = name;
  document.getElementById('sbRole').textContent = role === 'instructor' ? 'Instructor' : 'Student';
  const av=document.getElementById('sbAvatar');
  av.textContent=name.slice(0,2).toUpperCase();
  av.style.background=role==='instructor'?'rgba(6,182,212,.15)':'rgba(139,92,246,.15)';
  av.style.color=role==='instructor'?'#06b6d4':'#8b5cf6';
  afterAuth();
});

/* ── MAIN ── */
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function afterAuth() {
  // Set date picker to today
  const dp = document.getElementById('datePicker');
  dp.value = todayStr();
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

  // Only instructors can use this page
  if (currentUser.role !== 'instructor') {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <div class="empty-title">Instructor Only</div>
        <div class="empty-sub">This page is for instructors to monitor student performance.</div>
      </div>`;
    return;
  }

  // Load Tradervue config from Firebase
  db.ref(TV_CONFIG_PATH).get().then(snap => {
    if (snap.exists()) {
      tvConfig = snap.val();
      loadData();
    } else {
      renderSetup();
    }
  });
}

/* ── SETUP ── */
function renderSetup(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="setup-card">
      <div class="setup-title">⚙️ Tradervue API Setup</div>
      <div style="font-size:13px;color:var(--t2);margin-top:-4px;">Enter your Tradervue organization admin credentials. Stored securely in Firebase — never shared with students.</div>
      <div class="setup-grid">
        <div class="setup-field">
          <label>Organization URL</label>
          <input id="tvOrgUrl" type="text" placeholder="e.g. your-org.tradervue.com" value="${tvConfig?.orgUrl || ''}"/>
        </div>
        <div class="setup-field">
          <label>Admin Username</label>
          <input id="tvUser" type="text" placeholder="Tradervue username" value="${tvConfig?.username || ''}"/>
        </div>
        <div class="setup-field">
          <label>Admin Password</label>
          <input id="tvPass" type="password" placeholder="Tradervue password" value="${tvConfig?.password || ''}"/>
        </div>
      </div>
      <div class="setup-actions">
        <button class="btn-save" onclick="saveConfig()">Save & Connect</button>
        ${tvConfig ? '<button class="btn-secondary" onclick="loadData()">Cancel</button>' : ''}
        ${msg ? `<span class="setup-status err">⚠ ${msg}</span>` : ''}
      </div>
      <div class="setup-note">
        <strong>Setup required:</strong> You also need to deploy a Netlify serverless function to proxy API calls.<br>
        1. Add <code>/netlify/functions/tradervue.js</code> to your Netlify repo<br>
        2. Set <code>TV_USERNAME</code>, <code>TV_PASSWORD</code>, <code>TV_BASE_URL</code> in Netlify → Site Settings → Environment Variables<br>
        3. Redeploy — then paste your org URL above and save
      </div>
    </div>`;
}

function saveConfig() {
  const orgUrl  = document.getElementById('tvOrgUrl').value.trim().replace(/^https?:\/\//, '').replace(/\/+$/, '');
  const username = document.getElementById('tvUser').value.trim();
  const password = document.getElementById('tvPass').value;
  if (!orgUrl || !username || !password) { alert('Please fill in all fields.'); return; }
  tvConfig = { orgUrl, username, password };
  db.ref(TV_CONFIG_PATH).set(tvConfig).then(() => loadData());
}

/* ── DATA LOADING ── */
async function loadData() {
  if (!tvConfig) { renderSetup(); return; }
  const date = document.getElementById('datePicker').value || todayStr();
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-state"><div class="spinner"></div><div>Loading student performance…</div></div>`;

  try {
    // 1. Fetch all users in org
    const usersRes = await tvFetch('/users');
    if (usersRes.error) { renderError(usersRes.error); return; }
    const users = usersRes.users || [];

    if (users.length === 0) {
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state"><div class="empty-icon">👥</div>
        <div style="font-size:15px;font-weight:700;">No students found</div>
        <div style="font-size:13px;color:var(--t3);margin-top:6px;">Make sure students are in your Tradervue organization.</div></div>`;
      return;
    }

    // 2. Fetch trades for each user on selected date
    const studentData = await Promise.all(users.map(u => fetchStudentData(u, date)));

    renderDashboard(studentData, date);

  } catch (err) {
    renderError(err.message);
  }
}

async function fetchStudentData(user, date) {
  try {
    const data = await tvFetch('/trades', user.id, { startdate: date, enddate: date, max_trades: 100 });
    const trades = data.trades || [];
    const totalPL  = trades.reduce((s, t) => s + (parseFloat(t.gross_pl) || 0), 0);
    const winners  = trades.filter(t => (parseFloat(t.gross_pl) || 0) > 0).length;
    const winRate  = trades.length > 0 ? Math.round((winners / trades.length) * 100) : null;
    const best     = trades.reduce((b, t) => (parseFloat(t.gross_pl)||0) > (parseFloat(b?.gross_pl)||0) ? t : b, null);
    const worst    = trades.reduce((w, t) => (parseFloat(t.gross_pl)||0) < (parseFloat(w?.gross_pl)||0) ? t : w, null);
    return { user, trades, totalPL, winRate, winners, best, worst };
  } catch {
    return { user, trades: [], totalPL: 0, winRate: null, winners: 0, best: null, worst: null, error: true };
  }
}

async function tvFetch(endpoint, userId, params = {}) {
  const qs = new URLSearchParams({ endpoint, ...(userId ? { userId } : {}), ...params }).toString();
  const res = await fetch(`${TV_PROXY}?${qs}`);
  return res.json();
}

/* ── RENDER ── */
function renderDashboard(students, date) {
  const totalPL    = students.reduce((s, d) => s + d.totalPL, 0);
  const totalTrades = students.reduce((s, d) => s + d.trades.length, 0);
  const winners    = students.filter(d => d.totalPL > 0).length;
  const bestStudent = students.reduce((b, d) => d.totalPL > (b?.totalPL || -Infinity) ? d : b, null);

  const plClass = totalPL > 0 ? 'green' : totalPL < 0 ? 'red' : '';
  const plStr   = (totalPL >= 0 ? '+' : '') + '$' + Math.abs(totalPL).toFixed(2);

  let html = `
    <div class="summary-row">
      <div class="stat-card">
        <div class="stat-label">Total Students</div>
        <div class="stat-val blue">${students.length}</div>
        <div class="stat-sub">${totalTrades} trades today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Combined P&amp;L</div>
        <div class="stat-val ${plClass}">${plStr}</div>
        <div class="stat-sub">All students combined</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Profitable Students</div>
        <div class="stat-val green">${winners}</div>
        <div class="stat-sub">of ${students.length} total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Performer</div>
        <div class="stat-val purple" style="font-size:16px;">${bestStudent?.user?.username || '—'}</div>
        <div class="stat-sub">${bestStudent && bestStudent.totalPL !== 0 ? (bestStudent.totalPL > 0 ? '+' : '') + '$' + bestStudent.totalPL.toFixed(2) : 'No trades'}</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Student Performance</div>
        <div class="table-count">${students.length} students — ${new Date(date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        <button class="btn-secondary" style="margin-left:auto;font-size:11px;padding:5px 12px;" onclick="renderSetup()">⚙ Settings</button>
      </div>
      <table class="tv-table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Trades</th>
            <th>P&amp;L</th>
            <th>Win Rate</th>
            <th>Best Trade</th>
            <th>Worst Trade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="studentsTableBody">
          ${students.map(d => renderStudentRow(d)).join('')}
        </tbody>
      </table>
    </div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function renderStudentRow(d) {
  const { user, trades, totalPL, winRate, best, worst } = d;
  const plStr  = trades.length === 0 ? '—' : (totalPL >= 0 ? '+' : '') + '$' + Math.abs(totalPL).toFixed(2);
  const plCls  = totalPL > 0 ? 'pl-pos' : totalPL < 0 ? 'pl-neg' : 'pl-zero';
  const wrStr  = winRate !== null ? winRate + '%' : '—';
  const wrCls  = winRate === null ? '' : winRate >= 60 ? 'win-high' : winRate >= 40 ? 'win-mid' : 'win-low';
  const bestStr  = best ? ((parseFloat(best.gross_pl)||0) >= 0 ? '+' : '') + '$' + Math.abs(parseFloat(best.gross_pl)||0).toFixed(2) + ' ' + (best.symbol||'') : '—';
  const worstStr = worst ? ((parseFloat(worst.gross_pl)||0) >= 0 ? '+' : '') + '$' + Math.abs(parseFloat(worst.gross_pl)||0).toFixed(2) + ' ' + (worst.symbol||'') : '—';

  return `
    <tr class="student-row" onclick="toggleStudent('${user.id}', this)" id="row-${user.id}">
      <td><div class="student-name">${user.username}</div><div class="student-email">${user.email || ''}</div></td>
      <td>${trades.length}</td>
      <td class="${plCls}">${plStr}</td>
      <td>${winRate !== null ? `<span class="win-pill ${wrCls}">${wrStr}</span>` : '—'}</td>
      <td style="color:var(--green);">${bestStr}</td>
      <td style="color:var(--red);">${worstStr}</td>
      <td><button class="expand-btn" id="expbtn-${user.id}">${trades.length > 0 ? '▸ Trades' : 'No trades'}</button></td>
    </tr>
    <tr class="detail-row" id="detail-${user.id}" style="display:none;">
      <td colspan="7">${renderTradeDetail(user, trades)}</td>
    </tr>`;
}

function renderTradeDetail(user, trades) {
  if (trades.length === 0) {
    return `<div class="detail-inner"><div class="no-trades">No trades on this day</div></div>`;
  }
  const rows = trades.map(t => {
    const pl = parseFloat(t.gross_pl) || 0;
    const plStr = (pl >= 0 ? '+' : '') + '$' + Math.abs(pl).toFixed(2);
    const plCls = pl > 0 ? 'pl-pos' : pl < 0 ? 'pl-neg' : 'pl-zero';
    const side  = (t.side || '').toUpperCase();
    return `
      <tr>
        <td><strong>${t.symbol || '—'}</strong></td>
        <td><span class="trade-row-badge ${side === 'L' ? 'badge-L' : 'badge-S'}">${side === 'L' ? 'LONG' : 'SHORT'}</span></td>
        <td>${t.quantity || '—'}</td>
        <td>${t.entry_price != null ? '$' + parseFloat(t.entry_price).toFixed(2) : '—'}</td>
        <td>${t.exit_price != null ? '$' + parseFloat(t.exit_price).toFixed(2) : '—'}</td>
        <td class="${plCls}">${plStr}</td>
        <td style="color:var(--t2);font-size:11px;">${t.tags ? t.tags.join(', ') : ''}</td>
      </tr>`;
  }).join('');

  return `
    <div class="detail-inner">
      <div class="detail-title">📋 ${user.username}'s trades</div>
      <table class="trades-mini">
        <thead>
          <tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Tags</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function toggleStudent(userId, row) {
  const detail = document.getElementById('detail-' + userId);
  const btn    = document.getElementById('expbtn-' + userId);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'table-row';
  btn.textContent = isOpen ? '▸ Trades' : '▾ Close';
}

function renderError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="setup-card" style="border-color:rgba(255,59,48,.25);">
      <div class="setup-title" style="color:var(--red);">⚠ Connection Error</div>
      <div style="font-size:13px;color:var(--t2);">${msg}</div>
      <div class="setup-actions">
        <button class="btn-save" style="background:var(--red);" onclick="loadData()">Retry</button>
        <button class="btn-secondary" onclick="renderSetup()">Edit Settings</button>
      </div>
      <div class="setup-note">
        <strong>Common issues:</strong><br>
        • Netlify function not deployed — add <code>/netlify/functions/tradervue.js</code> to your repo<br>
        • Environment variables missing — set <code>TV_USERNAME</code> and <code>TV_PASSWORD</code> in Netlify<br>
        • Wrong org URL — check your Tradervue organization URL<br>
        • Organization API not enabled — contact Tradervue support
      </div>
    </div>`;
}
</script>
